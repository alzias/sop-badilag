<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOP Builder — Ditjen Badilag MA RI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08111f;--card:#0f1c2e;--card2:#131f30;
  --b1:rgba(0,245,212,.10);--b2:rgba(0,245,212,.18);
  --cyan:#00f5d4;--cyan2:#00c4aa;
  --amber:#ffb703;--red:#ff4d6d;--green:#06d6a0;--purple:#a855f7;
  --mu:#5a7a8a;--mu2:#8fa8b8;--tx:#deeaf2;
  --r:12px;--r2:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 15% 10%,rgba(0,245,212,.05) 0%,transparent 60%),
             radial-gradient(ellipse 50% 50% at 85% 90%,rgba(67,97,238,.07) 0%,transparent 60%);
  z-index:0;}

/* TOAST */
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-70px);
  background:rgba(0,245,212,.12);backdrop-filter:blur(16px);border:1px solid rgba(0,245,212,.3);
  color:var(--cyan);padding:10px 22px;border-radius:40px;font-size:13px;font-weight:600;
  z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.err{background:rgba(255,77,109,.12);border-color:rgba(255,77,109,.3);color:var(--red);}

/* HEADER */
.hd{position:sticky;top:0;z-index:100;background:rgba(8,17,31,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--b1);padding:0 20px;display:flex;align-items:center;gap:12px;height:56px;}
.hd-logo{width:32px;height:32px;object-fit:contain;border-radius:6px;}
.hd-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.3px;}
.hd-sub{font-size:11px;color:var(--mu2);margin-top:1px;}
.hd-badges{margin-left:auto;display:flex;gap:6px;}
.badge{background:rgba(0,245,212,.1);border:1px solid rgba(0,245,212,.2);color:var(--cyan);
  border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.5px;}
.badge.green{background:rgba(6,214,160,.1);border-color:rgba(6,214,160,.2);color:var(--green);}
.badge.amber{background:rgba(255,183,3,.1);border-color:rgba(255,183,3,.2);color:var(--amber);}
.badge.purple{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.2);color:var(--purple);}

/* CONTEXT BAR — info pegawai dari URL params */
#ctxBar{display:none;background:rgba(0,245,212,.05);border-bottom:1px solid var(--b1);
  padding:8px 20px;font-size:12px;color:var(--mu2);display:flex;align-items:center;gap:12px;}
.ctx-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),#4361ee);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
#ctxBar .ctx-close{margin-left:auto;background:none;border:none;color:var(--mu);cursor:pointer;font-size:14px;}

/* TABS */
.tabs{display:flex;gap:4px;padding:10px 16px;background:rgba(15,28,46,.8);
  border-bottom:1px solid var(--b1);position:sticky;top:56px;z-index:90;backdrop-filter:blur(10px);}
.tab-btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .2s;
  background:rgba(255,255,255,.05);color:var(--mu2);}
.tab-btn:hover{background:rgba(255,255,255,.08);color:var(--tx);}
.tab-btn.on{background:var(--cyan);color:#000;}
.tab-btn.on.amber{background:var(--amber);}
.tab-btn.on.purple{background:var(--purple);}

/* MAIN CONTENT */
.main{padding:18px 16px 48px;max-width:720px;margin:0 auto;position:relative;z-index:1;}

/* CARD */
.card{background:var(--card2);border:1px solid var(--b1);border-radius:var(--r2);
  padding:16px;margin-bottom:12px;}
.card-title{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  margin-bottom:14px;}
.card-title.cyan{color:var(--cyan);}
.card-title.amber{color:var(--amber);}
.card-title.green{color:var(--green);}

/* INPUTS */
.flabel{display:block;font-size:10px;font-weight:700;color:var(--cyan);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.flabel.amber{color:var(--amber);}
.finput,.fselect{width:100%;padding:10px 13px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r);color:var(--tx);font-family:'DM Sans',sans-serif;
  font-size:13px;outline:none;transition:border .2s,box-shadow .2s;
  margin-bottom:12px;box-sizing:border-box;}
.finput:focus,.fselect:focus{border-color:rgba(0,245,212,.5);box-shadow:0 0 0 3px rgba(0,245,212,.07);}
.finput::placeholder{color:var(--mu);}
.fselect option{background:#0f1c2e;}
textarea.finput{resize:vertical;min-height:72px;line-height:1.5;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* MULTIFIELD */
.mf-row{display:flex;gap:7px;margin-bottom:6px;align-items:center;}
.mf-num{color:var(--mu);font-size:12px;min-width:18px;flex-shrink:0;}
.mf-input{flex:1;padding:8px 11px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);border-radius:9px;color:var(--tx);
  font-size:13px;outline:none;font-family:inherit;transition:border .2s;}
.mf-input:focus{border-color:rgba(0,245,212,.4);}
.mf-del{background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.25);
  color:var(--red);border-radius:8px;padding:0 10px;height:34px;cursor:pointer;flex-shrink:0;
  font-size:14px;transition:all .15s;}
.mf-del:hover{background:rgba(255,77,109,.2);}
.mf-add{background:rgba(0,245,212,.07);border:1px solid var(--b1);color:var(--cyan);
  border-radius:9px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;
  margin-top:3px;transition:all .15s;font-family:inherit;}
.mf-add:hover{background:rgba(0,245,212,.13);}

/* LANGKAH */
.step-wrap{background:rgba(255,255,255,.03);border:1px solid var(--b1);
  border-radius:12px;padding:12px;margin-bottom:9px;transition:border .2s;}
.step-wrap:hover{border-color:var(--b2);}
.step-wrap.warn-empty{border-color:rgba(255,183,3,.5);background:rgba(255,183,3,.04);}
.step-warn-badge{font-size:10px;color:var(--amber);font-weight:700;margin-left:8px;}
.step-num{background:var(--cyan);color:#000;border-radius:50%;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;margin-top:3px;}
.step-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:8px;
  padding-left:30px;margin-top:8px;}
.step-sublabel.ket{color:var(--cyan);opacity:.7;}
.step-input.step-keterangan{border-color:rgba(0,245,212,.18);background:rgba(0,245,212,.04);}
.step-input.step-keterangan:focus{border-color:rgba(0,245,212,.45);}
.step-sublabel{font-size:10px;font-weight:600;margin-bottom:3px;}
.step-sublabel.amber{color:var(--amber);}
.step-sublabel.mu{color:var(--mu2);}
.step-input{width:100%;padding:6px 9px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);border-radius:8px;color:var(--tx);
  font-size:12px;outline:none;box-sizing:border-box;font-family:inherit;transition:border .2s;}
.step-input:focus{border-color:rgba(0,245,212,.4);}
.step-select{width:100%;padding:6px 9px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);border-radius:8px;color:var(--tx);
  font-size:12px;outline:none;}
.step-select option{background:#0f1c2e;}

/* DRAG ZONE */
.drop-zone{border:2px dashed rgba(0,245,212,.3);border-radius:var(--r2);
  padding:28px 20px;text-align:center;cursor:pointer;margin-bottom:16px;
  transition:all .2s;background:rgba(0,245,212,.03);}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--cyan);
  background:rgba(0,245,212,.07);}
.drop-zone input{display:none;}

/* FILE STATUS BARS */
.status-bar{border-radius:12px;padding:12px 14px;margin-bottom:14px;
  display:flex;align-items:center;gap:12px;}
.status-bar.ok{background:rgba(6,214,160,.08);border:1px solid rgba(6,214,160,.25);}
.status-bar.err{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.25);}
.status-bar.loading{background:rgba(0,245,212,.06);border:1px solid var(--b1);}
.progress-bar{height:4px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-top:10px;}
.progress-fill{height:100%;background:var(--cyan);border-radius:3px;
  width:0;transition:width .8s ease;}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;
  border-radius:var(--r);transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#000;
  padding:13px 20px;font-size:14px;width:100%;justify-content:center;font-size:15px;}
.btn-primary:hover{box-shadow:0 6px 24px rgba(0,245,212,.3);transform:translateY(-1px);}
.btn-secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  color:var(--mu2);padding:10px 16px;font-size:13px;}
.btn-secondary:hover{background:rgba(255,255,255,.1);color:var(--tx);}
.btn-danger{background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.25);
  color:var(--red);padding:8px 14px;font-size:13px;}
.btn-success{background:rgba(6,214,160,.12);border:1px solid rgba(6,214,160,.25);
  color:var(--green);padding:9px 16px;font-size:13px;}
.btn-warning{background:rgba(255,183,3,.12);border:1px solid rgba(255,183,3,.25);
  color:var(--amber);padding:9px 16px;font-size:13px;}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:800;
  align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
.modal.on{display:flex;}
.mbox{background:rgba(10,18,32,.98);border:1px solid var(--b2);border-radius:20px;
  width:100%;max-width:400px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.7);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.mhd{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--b1);background:linear-gradient(135deg,rgba(0,245,212,.08),rgba(67,97,238,.08));}
.mhd-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--cyan);}
.mclose{background:none;border:none;color:var(--mu2);font-size:20px;cursor:pointer;}
.mbody{padding:20px;}

/* STATUS TAG */
.stag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:700;}
.stag.draft{background:rgba(107,114,128,.15);border:1px solid rgba(107,114,128,.3);color:var(--mu2);}
.stag.pending_e3,.stag.pending{background:rgba(255,183,3,.13);border:1px solid rgba(255,183,3,.3);color:var(--amber);}
.stag.pending_admin{background:rgba(168,85,247,.13);border:1px solid rgba(168,85,247,.3);color:var(--purple);}
.stag.pending_e2{background:rgba(99,102,241,.13);border:1px solid rgba(99,102,241,.3);color:#818cf8;}
.stag.signed{background:rgba(6,214,160,.13);border:1px solid rgba(6,214,160,.3);color:var(--green);}
.stag.rejected,.stag.rejected_e3,.stag.rejected_admin{background:rgba(255,77,109,.13);border:1px solid rgba(255,77,109,.3);color:var(--red);}

/* DRAFT CARD */
.draft-card{background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:12px;
  padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;}
.draft-card:hover{border-color:var(--b2);background:rgba(255,255,255,.05);}
.draft-card.sel{border-color:rgba(0,245,212,.4);background:rgba(0,245,212,.05);}
.draft-acts{display:flex;gap:8px;margin-top:10px;padding-top:10px;
  border-top:1px solid var(--b1);flex-wrap:wrap;}

/* WORKFLOW TIMELINE */
.tl{padding-left:20px;position:relative;}
.tl::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;
  width:2px;background:var(--b1);}
.tl-item{position:relative;margin-bottom:12px;}
.tl-dot{position:absolute;left:-17px;top:5px;width:10px;height:10px;
  border-radius:50%;background:var(--bg);border:2px solid var(--b1);}
.tl-dot.done{background:var(--cyan);border-color:var(--cyan);}
.tl-dot.active{background:var(--amber);border-color:var(--amber);
  box-shadow:0 0 8px rgba(255,183,3,.5);}
.tl-dot.rejected{background:var(--red);border-color:var(--red);}
.tl-label{font-size:12px;font-weight:600;margin-bottom:2px;}
.tl-meta{font-size:11px;color:var(--mu2);line-height:1.5;}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-card{background:var(--card2);border:1px solid var(--b1);border-radius:12px;
  padding:12px;text-align:center;}
.stat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin:4px 0 2px;}
.stat-lbl{font-size:10px;color:var(--mu2);}

/* FLOWCHART */
#flowWrap{overflow-x:auto;background:#fff;border-radius:10px;padding:12px;}

/* PREVIEW DOC */
#previewDoc{background:#fff;border-radius:12px;padding:20px;color:#000;
  font-family:Arial,sans-serif;font-size:11px;line-height:1.6;}

/* SCROLL */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,245,212,.2);border-radius:2px;}

@media(max-width:600px){
  .grid2{grid-template-columns:1fr;}
  .step-grid{grid-template-columns:1fr 1fr;}
  .stat-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<div id="toast"></div>

<!-- MODAL KONFIRMASI KIRIM -->
<div class="modal" id="mKirim">

<!-- HEADER -->

<script>
'use strict';

async function fbSaveSOP(sop) {
  if (!db) return false;
  try {
    const docId = sop.draftId || sop.id;
    const {id, draftId, ...data} = sop;
    data.draftId   = docId;
    data.updatedAt = new Date().toISOString();
    // Worker v5 collection: sop_drafts
    await db.collection('sop_drafts').doc(docId).set(data);
    return true;
  } catch(e) {
    console.error('Firebase save error:', e);
    return false;
  }
}

async function fbLoadSOPs() {
  if (!db) return [];
  try {
    // Worker v5 pakai collection 'sop_drafts'
    const snap = await db.collection('sop_drafts')
      .orderBy('tglKirim','desc').limit(100).get();
    return snap.docs.map(d => ({draftId: d.id, id: d.id, ...d.data()}));
  } catch(e) {
    console.error('Firebase load error:', e);
    return [];
  }
}

async function fbDeleteSOP(id) {
  if (!db) return;
  try { await db.collection('sop_drafts').doc(id).delete(); } catch(e) { console.error(e); }
}

function readURLContext() {
  const p = new URLSearchParams(window.location.search);
  const nip    = p.get('nip')    || p.get('NIP')    || '';
  const nama   = p.get('nama')   || p.get('NAMA')   || '';
  const unit   = p.get('unit')   || p.get('UNIT')   || '';
  const e3     = p.get('eselon3')|| p.get('e3')     || '';
  const e4     = p.get('eselon4')|| p.get('e4')     || '';
  const deptId = p.get('deptId') || '';

  if (nip || nama) {
    state.ctx = { nip, nama, unit, e3, e4, deptId };

    // Auto-inject ke form
    if (e3)   state.form.eselon3 = decodeURIComponent(e3);
    if (e4)   state.form.eselon4 = decodeURIComponent(e4);

    // Tampilkan context bar
    const bar = document.getElementById('ctxBar');
    if (bar) {
      bar.style.display = 'flex';
      document.getElementById('ctxName').textContent = decodeURIComponent(nama);
      document.getElementById('ctxUnit').textContent = decodeURIComponent(e4 || e3 || unit);
      document.getElementById('badgeUser').textContent = decodeURIComponent(nama);
      document.getElementById('badgeUser').style.display = '';
    }

    // Pre-fill modal NIP & nama
    setTimeout(function() {
      var el = document.getElementById('mNIP');
      var el2 = document.getElementById('mNama');
      if (el) el.value = nip;
      if (el2) el2.value = decodeURIComponent(nama);
    }, 100);
  }
}

// ══ PARSER .DOCX ══
function parseSOPFromText(raw) {
  const toISO = s => {
    if (!s) return '';
    s = s.trim();
    const bln = {januari:'01',februari:'02',maret:'03',april:'04',mei:'05',juni:'06',
                 juli:'07',agustus:'08',september:'09',oktober:'10',november:'11',desember:'12'};
    const m1 = s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
    if (m1) return m1[3]+'-'+m1[2].padStart(2,'0')+'-'+m1[1].padStart(2,'0');
    const m2 = s.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
    if (m2) return m2[3]+'-'+(bln[m2[2].toLowerCase()]||'01')+'-'+m2[1].padStart(2,'0');
    return '';
  };
  var lines = raw.split('\n').map(l => l.trimEnd());
  const HEADERS = ['DASAR HUKUM','KUALIFIKASI PELAKSANA','KETERKAITAN','PERALATAN','PERINGATAN','PENCATATAN','NOMOR SOP','NAMA SOP','TANGGAL','DISAHKAN','INSTANSI','ALAMAT','UNIT','ESELON','PELAKSANA','LANGKAH','PROSEDUR','MUTU BAKU'];
  const isSH = line => line.length < 60 && HEADERS.some(h => { const u=line.toUpperCase().trim(); return u===h||u.indexOf(h)===0; });
  const getInline = (...labels) => {
    for (const lb of labels)
      for (const line of lines) {
        const m = line.match(new RegExp('^'+lb+'\\s*[:\\t]+\\s*(.+)$','i'));
        if (m && m[1].trim()) return m[1].trim();
        // Format tabel | Label | Nilai |
        const mTbl = line.match(new RegExp(lb+'\\s*\\|\\s*([^|]+)','i'));
        if (mTbl && mTbl[1].trim()) return mTbl[1].trim();
      }
    return '';
  };

  // getTable: baca nilai dari format tabel Word yang di-extract mammoth
  // Format: "| Nomor SOP | 4372/DjA/... |"
  const getTable = (...labels) => {
    for (const lb of labels) {
      for (const line of lines) {
        // Split by | dan cari label yang cocok
        const parts = line.split('|').map(s => s.trim()).filter(s => s.length > 0);
        for (let i = 0; i < parts.length - 1; i++) {
          if (new RegExp('^'+lb+'$','i').test(parts[i])) {
            const val = parts[i+1] && parts[i+1].trim();
            if (val && val.length > 1) return val;
          }
        }
        // Format baris tunggal: "Label | Nilai"
        const m = line.match(new RegExp('^\\|?\\s*'+lb+'\\s*\\|\\s*([^|\\n]+)','i'));
        if (m && m[1].trim()) return m[1].trim();
      }
    }
    return '';
  };

  const getNextLine = (...labels) => {
    for (const lb of labels)
      for (let i=0;i<lines.length-1;i++) {
        if (new RegExp('^'+lb+'\\s*[:\\t]*\\s*$','i').test(lines[i].trim()))
          for (let j=i+1;j<Math.min(i+4,lines.length);j++) {
            const v=lines[j].trim();
            if (v && v.length>1 && !isSH(v)) return v;
          }
      }
    return '';
  };
  // ── Section parser: lebih toleran terhadap spasi, trailing char, dan baris-in-tabel ──
  // Gunakan includes() bukan exact-match agar header seperti "KETERKAITAN:" atau
  // "Keterkaitan" yang tidak berdiri sendiri tetap terdeteksi
  const SECTION_KEYS = [
    'PENCATATAN DAN PENDATAAN','KUALIFIKASI PELAKSANA',
    'DASAR HUKUM','KETERKAITAN','PERALATAN','PERINGATAN','PENCATATAN','PELAKSANA'
  ];
  const sections = {};
  let cur = null;
  for (const line of lines) {
    const t = line.trim().toUpperCase().replace(/[:\t]+$/, '').trim();
    // Cek apakah baris ini adalah header section (toleran: includes + panjang wajar)
    const matched = SECTION_KEYS.find(k => {
      if (t === k) return true;                          // exact
      if (t.startsWith(k) && t.length <= k.length + 5) return true; // "KETERKAITAN:" dll
      // Baris pendek (≤50) yang mengandung kata kunci persis (bukan dalam kalimat panjang)
      return t.length <= 50 && t.includes(k) && !t.match(/^\d+[.)]/);
    });
    if (matched) { cur = matched; sections[cur] = sections[cur] || []; }
    else if (cur && line.trim()) sections[cur].push(line.trim());
  }
  const NOISE = /^(kualifikasi pelaksana|keterkaitan|peralatan|peringatan|pencatatan|pelaksana|uraian kegiatan|langkah|prosedur|dasar hukum|mutu baku|persyaratan|waktu|output|ket\.?)\s*[:\t]*$/i;
  const getSection = (...keys) => {
    for (const k of keys) {
      const found = Object.keys(sections).find(s => s.includes(k.toUpperCase()));
      if (found && sections[found].length)
        return sections[found].map(l=>l.replace(/^\d+[\.\)]\s*/,'').replace(/^[•\-]\s*/,'').trim()).filter(l=>l.length>2&&!NOISE.test(l)).slice(0,15);
    }
    return [''];
  };
  const jabRe = /^(Direktur|Sekretaris|Kepala|Kasubdit|Kabag|Kasubbag|Kasi|Pelaksana|Staf|Hakim|Panitera|Jurusita|Pegawai|Admin)/i;
  const extractPelaksana = () => {
    const found = []; let inP = false;
    for (const line of lines) {
      const t = line.trim();
      if (/^PELAKSANA\s*$/i.test(t)) { inP=true; continue; }
      if (inP) {
        if (isSH(t) && !jabRe.test(t)) break;
        if (jabRe.test(t) && t.length<60 && !found.includes(t)) found.push(t);
        if (found.length>=8) break;
      }
    }
    if (!found.length) for (const line of lines) {
      const t=line.trim();
      if (jabRe.test(t)&&t.length>3&&t.length<55&&!found.includes(t)) { found.push(t); if(found.length>=8) break; }
    }
    return found.length ? found : ['Pelaksana'];
  };
  const skipRe = /^(PP |UU |Peraturan|Keputusan|Undang|Perka|Surat Edaran|KMA |MA\s+No)/i;
  const extractLangkah = () => {
    const hasil=[]; let inP=false;
    for (const line of lines) {
      const t=line.trim();
      if (/^(LANGKAH|URAIAN KEGIATAN|PROSEDUR|AKTIVITAS|NO\s*\.\s*URAIAN)/i.test(t)) { inP=true; continue; }
      if (inP) {
        const m=t.match(/^(\d{1,2})[.\)]\s+(.{10,})/);
        if (m&&!skipRe.test(m[2])) hasil.push({aktivitas:m[2].trim().slice(0,250),pelaksana:0,persyaratan:'',waktu:'1 hari',output:'',keterangan:''});
        if (hasil.length>=30) break;
      }
    }
    if (!hasil.length) for (const line of lines) {
      const m=line.trim().match(/^(\d{1,2})[.\)]\s+(.{10,})/);
      if (m&&!skipRe.test(m[2])&&m[2].length>15&&!/^\d{4}$/.test(m[2])&&!/^(SOP|Nomor|Nama|Tanggal|Unit|Instansi)/i.test(m[2])) {
        hasil.push({aktivitas:m[2].trim().slice(0,250),pelaksana:0,persyaratan:'',waktu:'1 hari',output:'',keterangan:''});
        if (hasil.length>=30) break;
      }
    }
    return hasil.length ? hasil : [{aktivitas:'',pelaksana:0,persyaratan:'',waktu:'',output:'',keterangan:''}];
  };
  const perRe = /^(PP |UU |Undang|Peraturan|Keputusan|Instruksi|Perka|KMA |Surat Edaran|MA |PERMEN|PERPRES|INPRES)/i;
  const dhRaw = getSection('DASAR HUKUM');
  const dh = dhRaw.filter(l=>perRe.test(l)||l.length>20).slice(0,15);
  const kualRaw = getSection('KUALIFIKASI PELAKSANA');
  const kual = kualRaw.filter(l=>l.length<100&&!perRe.test(l)).slice(0,8);
  let e3='', e4='';
  for (let i=0;i<lines.length-1;i++) {
    const t=lines[i].trim().toUpperCase();
    if (['UNIT','UNIT KERJA','BAGIAN','ESELON III'].includes(t)) {
      const v1=lines[i+1]&&lines[i+1].trim();
      if (v1&&v1.length>2&&v1.length<80&&!isSH(v1)) {
        e3=v1;
        const v2=lines[i+2]&&lines[i+2].trim();
        if (v2&&v2.length>2&&v2.length<80&&!isSH(v2)&&v2!==v1) e4=v2;
      }
      break;
    }
  }
  if (!e3) e3=getInline('UNIT','BAGIAN','ESELON III','UNIT KERJA');
  if (!e4) e4=getInline('SUB BAGIAN','SUBBAG','ESELON IV','KASUBBAG','KASI');
  let instansi=getInline('INSTANSI')||getNextLine('INSTANSI');
  if (!instansi) for (const line of lines) { if (/direktorat jenderal/i.test(line)&&line.length<100){instansi=line.trim();break;} }
  return {
    nomorSOP: getInline('NOMOR SOP','NO\\.? SOP','NOMOR')||getNextLine('NOMOR SOP','NO SOP'),
    namaSOP:  (()=>{ const n=getTable('Nama SOP','NAMA SOP','Judul SOP')||getInline('NAMA SOP','JUDUL SOP')||getNextLine('NAMA SOP','JUDUL SOP'); return n.replace(/^\d+\.\s*/,'').trim(); })(),
    eselon3: e3, eselon4: e4,
    instansi: instansi||'Direktorat Jenderal Badan Peradilan Agama Mahkamah Agung RI',
    alamat: getInline('ALAMAT')||getNextLine('ALAMAT')||'Jl. Jenderal Ahmad Yani Kav.58 Gedung Sekretariat MA RI Lt. 6-8 Jakarta Pusat',
    tglPembuatan: toISO(getTable('Tanggal Pembuatan','Tgl Pembuatan')||getInline('TANGGAL PEMBUATAN','TGL PEMBUATAN')||getNextLine('TANGGAL PEMBUATAN')),
    tglRevisi:    toISO(getTable('Tanggal Revisi','Tgl Revisi')||getInline('TANGGAL REVISI','TGL REVISI')||getNextLine('TANGGAL REVISI')),
    tglEfektif:   toISO(getTable('Tanggal Evektif','Tanggal Efektif','Tgl Efektif')||getInline('TANGGAL EFEKTIF','TGL EFEKTIF')||getNextLine('TANGGAL EFEKTIF')),
    disahkanOleh: getTable('Disahkan Oleh','Ditetapkan Oleh')||getInline('DISAHKAN OLEH','DITETAPKAN OLEH')||getNextLine('DISAHKAN OLEH')||'Dirjen Badan Peradilan Agama',
    dasarHukum: dh.length?dh:[''], kualifikasiPelaksana: kual.length?kual:[''],
    keterkaitan: getSection('KETERKAITAN').filter(l=>l.length>3).concat(['']).slice(0,10),
    peralatan:   getSection('PERALATAN').filter(l=>!perRe.test(l)&&l.length<80).concat(['']).slice(0,10),
    peringatan:  getSection('PERINGATAN').filter(l=>l.length>5).concat(['']).slice(0,5),
    pencatatan:  getSection('PENCATATAN').filter(l=>l.length>2).concat(['']).slice(0,5),
    deskripsi:'', pelaksana: extractPelaksana(), langkah: extractLangkah()
  };
}

// ══ populateForm — saran Gemini ══
// Mengisi state.form.langkah dari hasil parseSOPPro dan re-render UI
// Dipakai setelah parsing selesai atau bisa dipanggil manual untuk reset langkah
function populateForm(dataLangkah) {
  if (!Array.isArray(dataLangkah) || dataLangkah.length === 0) return;
  // Normalisasi: pastikan setiap item punya field lengkap
  const nPel = (state.form.pelaksana || []).filter(p => p).length || 1;
  state.form.langkah = dataLangkah.map((l, i) => ({
    id          : l.id || i + 1,
    aktivitas   : l.aktivitas   || '',
    // Clamp pelaksana ke range valid — kalau index melebihi jumlah pelaksana, ke 0
    pelaksana   : typeof l.pelaksana === 'number' ? Math.min(l.pelaksana, nPel - 1) : 0,
    persyaratan : l.persyaratan || '',
    waktu       : l.waktu       || '',
    output      : l.output      || '',
    keterangan  : l.keterangan  || ''
  }));
  render();
}


// ══ PARSER SECTION DARI TABEL (untuk dokumen 1-tabel seperti SOP Cuti) ══
// Dokumen Badilag ada dua format:
//   A) Multi-tabel: section ada sebagai <p> di luar tabel → parseSectionFromHTML
//   B) Single-tabel: section ada di <td> dalam tabel besar → parseSectionFromTable
// Fungsi ini handle format B
function parseSectionFromTable(htmlString) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(htmlString, 'text/html');
  const tables = Array.from(doc.querySelectorAll('table'));
  if (!tables.length) return {};

  // Cari tabel yang mengandung label section
  const SECTION_LABEL_RE = /^(dasar hukum|kualifikasi pelaksana|keterkaitan|peralatan|peringatan|pencatatan)/i;
  let sectionTable = null;
  for (const t of tables) {
    const txt = t.textContent.toLowerCase();
    if (txt.includes('dasar hukum') && txt.includes('kualifikasi')) {
      sectionTable = t; break;
    }
  }
  if (!sectionTable) return {};

  const rows = Array.from(sectionTable.querySelectorAll('tr'));
  const result = {};

  // Scan tiap sel — kalau berisi label section, sel berikutnya (kanan/bawah) = konten
  const KEY_MAP = {
    'DASAR HUKUM'            : 'dasarHukum',
    'KUALIFIKASI PELAKSANA'  : 'kualifikasiPelaksana',
    'KETERKAITAN'            : 'keterkaitan',
    'PERALATAN'              : 'peralatan',
    'PERALATAN/PERLENGKAPAN' : 'peralatan',
    'PERALATAN / PERLENGKAPAN': 'peralatan',
    'PERINGATAN'             : 'peringatan',
    'PENCATATAN DAN PENDATAAN': 'pencatatan',
    'PENCATATAN'             : 'pencatatan',
  };

  for (let ri = 0; ri < rows.length; ri++) {
    const cells = Array.from(rows[ri].querySelectorAll('td'));
    for (let ci = 0; ci < cells.length; ci++) {
      const label = cells[ci]?.textContent.trim().replace(/\s*[:/]\s*$/, '').toUpperCase().trim();
      const key   = KEY_MAP[label];
      if (!key) continue;

      // Konten ada di sel berikutnya di baris yang SAMA (format: Label | | Konten)
      // atau di baris berikutnya kolom yang sama
      let kontenTeks = '';

      // Cek sel kanan (skip sel kosong)
      for (let k = ci + 1; k < cells.length; k++) {
        const txt = cells[k]?.textContent.trim();
        if (txt && txt.length > 3 && !KEY_MAP[txt.replace(/\s*[:/]\s*$/, '').toUpperCase().trim()]) {
          kontenTeks = txt; break;
        }
      }

      // Kalau tidak ada di kanan, cek baris berikutnya kolom yang sama
      if (!kontenTeks && ri + 1 < rows.length) {
        const nextCells = Array.from(rows[ri + 1].querySelectorAll('td'));
        if (nextCells[ci]) kontenTeks = nextCells[ci].textContent.trim();
      }

      if (kontenTeks && kontenTeks.length > 3) {
        // Split berdasarkan titik-koma atau newline (format list Badilag)
        const items = kontenTeks
          .split(/;|\n/)
          .map(s => s.trim().replace(/^\d+[.)\s]+/, ''))
          .filter(s => s.length > 2);
        if (items.length > 0) result[key] = items.concat(['']);
      }
    }
  }
  return result;
}


// ══ PARSER SECTION DARI HTML (untuk Keterkaitan, Peringatan, dll) ══
// mammoth.convertToHtml menghasilkan <p> per paragraf — lebih akurat untuk section berbasis list
// Fungsi ini melengkapi parseSOPFromText yang bekerja di raw text
// ══ PARSER SECTION DARI HTML ══
// Membaca konten section (Keterkaitan, Peringatan, dll) dari HTML mammoth.
// Dokumen Badilag: header section ada di dalam TABEL identitas atau sebagai <p> tersendiri.
// Strategi: cari <p>/<li> yang PERSIS berisi nama header, lalu kumpulkan sampai header lain.
function parseSectionFromHTML(htmlString, headerName) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(htmlString, 'text/html');

  // Semua header yang menjadi boundary
  const ALL_HDR = [
    'DASAR HUKUM','KUALIFIKASI PELAKSANA','KETERKAITAN',
    'PERALATAN / PERLENGKAPAN','PERALATAN/PERLENGKAPAN','PERALATAN',
    'PERINGATAN','PENCATATAN DAN PENDATAAN','PENCATATAN',
    'PELAKSANA','LANGKAH','URAIAN KEGIATAN','MUTU BAKU'
  ];

  // Normalise teks: uppercase, hapus titik-dua dan whitespace trailing
  const norm = s => s.toUpperCase().replace(/[\s\t]*[:/]\s*$/, '').replace(/\s+/g,' ').trim();

  const isHeader = txt => {
    const n = norm(txt);
    return ALL_HDR.some(h => n === h || (n.startsWith(h) && n.length <= h.length + 4));
  };
  const isThisHeader = txt => {
    const n   = norm(txt);
    const key = headerName.toUpperCase().replace(/\s+/g,' ').trim();
    return n === key || (n.startsWith(key) && n.length <= key.length + 4);
  };

  // Hanya scan <p> dan <li> — abaikan <td> agar data tabel tidak masuk
  const elems = Array.from(doc.querySelectorAll('p, li'));
  const result = [];
  let found = false;

  for (const el of elems) {
    const txt = el.textContent.trim();
    if (!txt) continue;

    if (!found) {
      if (isThisHeader(txt)) found = true;
      continue;
    }

    // Berhenti kalau ketemu header section lain
    if (isHeader(txt) && !isThisHeader(txt)) break;

    // Skip noise: baris yang hanya berisi nama header itu sendiri (duplikat)
    if (isThisHeader(txt)) continue;

    // Skip baris yang terlalu pendek (< 4 karakter) atau hanya berupa label
    const clean = txt.replace(/^\d+[.)\s]+/, '').replace(/^[•\-\*]\s*/, '').trim();
    if (clean.length < 4) continue;

    result.push(clean);
  }
  return result;
}

// ══ parseSOPPro — Parser Tabel Aktivitas ══
// Implementasi Gemini (slice+map bersih) + pengaman milik kita:
//   • maxCols → pilih tabel paling lebar (bukan tabel header identitas)
//   • rows[0].cells.length >= 9 → sesuai standar Badilag (9-10 kolom)
//   • IDENTITAS_RE → buang baris header yang nyasar ke tabel prosedur
//   • startIdx via angka urut → skip header rows secara akurat
function parseTabelAktivitas(htmlString) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(htmlString, 'text/html');
  const tables = Array.from(doc.querySelectorAll('table'));
  if (!tables.length) return [];

  // ── Pilih tabel prosedur ──
  // ROOT CAUSE FIX: header tabel Badilag pakai colspan (5 <td> fisik untuk 11 kolom efektif)
  // Sehingga rows[0].cells.length = 5, BUKAN 11 — filter >= 9 selalu gagal di header!
  // Solusi: hitung maxCols dari BARIS DATA (skip baris yang kemungkinan header).
  // Baris data = baris yang kolom pertamanya berisi angka urut (1, 2, 3...)
  const getDataRowCols = t => {
    const rows = Array.from(t.querySelectorAll('tr'));
    for (const row of rows) {
      const tds  = row.querySelectorAll('td');
      const col0 = tds[0]?.textContent.trim();
      const col1 = tds[1]?.textContent.trim() || '';
      // Angka urut dengan atau tanpa titik: "1", "2", "1.", "2." dst
      // Kolom 1 harus berisi teks bermakna (bukan kosong/label header)
      // Pastikan bukan baris separator kosong (semua sel kosong)
      const isDataRow = /^\d{1,2}\.?$/.test(col0) && col1.length >= 5 && tds.length >= 6;
      if (isDataRow) return tds.length;
    }
    // Fallback: baris terbanyak sel yang bukan baris kosong
    let maxN = 0;
    for (const row of rows) {
      const tds = row.querySelectorAll('td');
      const hasContent = Array.from(tds).some(td => td.textContent.trim().length > 2);
      if (tds.length > maxN && hasContent) maxN = tds.length;
    }
    return maxN;
  };

  // Urutkan: tabel dengan baris data paling banyak kolom = tabel prosedur
  const sortedByWidth = [...tables].sort((a,b) => getDataRowCols(b) - getDataRowCols(a));
  let tabel = sortedByWidth.find(t =>
    getDataRowCols(t) >= 6 && t.querySelectorAll('tr').length >= 3
  );
  if (!tabel) tabel = sortedByWidth[0];
  if (!tabel) return [];

  // ── Temukan startIdx: baris data pertama ──
  // Strategi: cari baris di mana kolom 0 = angka urut (1,2,3)
  // DAN jumlah kolom di baris itu >= 6 (baris data tidak pakai colspan)
  const allRows = Array.from(tabel.querySelectorAll('tr'));
  let startIdx = -1;
  for (let i = 0; i < allRows.length; i++) {
    const cells = allRows[i].querySelectorAll('td');
    const n    = cells.length;
    const col0 = cells[0]?.textContent.trim();
    const col1 = cells[1]?.textContent.trim() || '';
    // Angka urut dengan atau tanpa titik: "1", "1.", "2.", dst
    // Harus punya teks di col1 minimal 5 karakter (bukan baris kosong/separator)
    // Harus punya minimal 6 kolom (baris data tidak pakai colspan)
    if (/^\d{1,2}\.?$/.test(col0) && col1.length >= 5 && n >= 6) {
      const looksLikeHeader = col1 === col1.toUpperCase() && col1.length < 25 && !/[,;.\d]/.test(col1);
      if (!looksLikeHeader) { startIdx = i; break; }
    }
  }
  if (startIdx === -1) {
    // Fallback: cari baris yang punya kolom >= 6 DAN ada konten di col1
    // Skip baris separator kosong (meski punya banyak kolom)
    for (let i = 0; i < allRows.length; i++) {
      const cells = allRows[i].querySelectorAll('td');
      if (cells.length >= 6) {
        const col1 = cells[1]?.textContent.trim() || '';
        if (col1.length >= 5) { startIdx = i; break; }
      }
    }
  }
  if (startIdx < 0 || startIdx >= allRows.length) return [];

  // ── Filter baris identitas yang nyasar ──
  const IDENTITAS_RE = /^(nomor\s*sop|nama\s*sop|tanggal\s*(pembuatan|revisi|efektif)|disahkan\s*oleh|tgl\s*(pembuatan|revisi|efektif)|unit\s*e[\-\s]?(iii|iv|3|4)|instansi|alamat|direktorat\s*jenderal.*mahkamah)/i;

  // ── Map baris data → format Gemini yang bersih + dual strategy kolom ──
  const hasil = Array.from(allRows).slice(startIdx)
    .map((row, idx) => {
      const cells = row.querySelectorAll('td');
      const n     = cells.length;
      if (n < 6) return null;

      const col0      = cells[0]?.textContent.trim();
      const aktivitas = cells[1]?.textContent.trim() || '';

      // Skip baris non-data — izinkan "1", "1.", "2." (format Badilag pakai titik)
      if (col0 && !/^\d{1,2}\.?$/.test(col0)) return null;
      if (!aktivitas || aktivitas.length < 4) return null;
      if (aktivitas === aktivitas.toUpperCase() && aktivitas.length < 35 && !/[,;.\d]/.test(aktivitas)) return null;
      if (IDENTITAS_RE.test(aktivitas)) return null;

      // Mapping kolom — Gemini index eksplisit untuk n>=9, fallback dari kanan untuk n<9
      // Format Badilag n=8: [0]No [1]Uraian [2]Pel1 [3]Pel2 [4]Persyaratan [5]Waktu [6]Output [7]Ket
      // Format Badilag n=9: [0]No [1]Uraian [2]Pel1 [3]Pel2 [4]Pel3? [5]Persyaratan [6]Waktu [7]Output [8]Ket
      let persyaratan, waktu, output, keterangan;
      if (n >= 9) {
        persyaratan = cells[n-4]?.textContent.trim() || '';
        waktu       = cells[n-3]?.textContent.trim() || '';
        output      = cells[n-2]?.textContent.trim() || '';
        keterangan  = cells[n-1]?.textContent.trim() || '';
      } else {
        keterangan  = cells[n-1]?.textContent.trim() || '';
        output      = cells[n-2]?.textContent.trim() || '';
        waktu       = cells[n-3]?.textContent.trim() || '';
        persyaratan = n >= 4 ? (cells[n-4]?.textContent.trim() || '') : '';
      }

      // Sanity check: waktu harus berupa durasi atau kosong
      const waktuOk = !waktu || /\d|hari|menit|jam|minggu|bulan/i.test(waktu) || waktu.length <= 20;

      // Simpan teks pelaksana dari kolom 2 untuk di-resolve ke index nanti
      // Format Badilag: kolom 2 = Pelaksana 1, kolom 3 = Pelaksana 2, dst
      // Kita cek kolom mana yang berisi tanda centang (✓) atau tidak kosong
      let pelaksanaIdx = 0;
      const pelStart = 2;
      const pelEnd   = Math.max(2, n - 4); // kolom pelaksana = antara 2 dan n-4
      for (let pk = pelStart; pk < pelEnd; pk++) {
        const c = cells[pk]?.textContent.trim();
        if (c && c.length > 0 && c !== '' ) { pelaksanaIdx = pk - pelStart; break; }
      }

      return {
        id          : idx + 1,
        aktivitas,
        pelaksana   : pelaksanaIdx,  // index relatif ke array pelaksana
        persyaratan : waktuOk ? persyaratan : '',
        waktu       : waktuOk ? waktu       : '',
        output      : waktuOk ? output      : '',
        keterangan  : waktuOk ? keterangan  : ''
      };
    })
    .filter(Boolean); // buang null (baris yang di-skip)

  return hasil;
}


// ══ EXPORT KE WORD (.docx) ══
// Menghasilkan file Word SOP format Badilag dari state.form
// Menggunakan docx.js (UMD) yang di-load via CDN
async function exportToWord() {
  const f = state.form;
  const D = window.docx;
  if (!D) { toast('Library docx.js belum siap, coba beberapa detik lagi', 'err'); return; }

  const {
    Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, WidthType, BorderStyle, ShadingType, VerticalAlign,
    PageOrientation, HeadingLevel
  } = D;

  const fmt = d => {
    if (!d) return '-';
    const dt = new Date(d);
    return isNaN(dt) ? d : dt.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  };
  const esc = s => (s||'').toString().trim();

  // ── Helpers ──
  const border1 = { style: BorderStyle.SINGLE, size: 4, color: '000000' };
  const borders  = { top:border1, bottom:border1, left:border1, right:border1 };
  const cellOpts = (w, opts={}) => ({
    borders, width:{size:w, type:WidthType.DXA},
    margins:{top:60,bottom:60,left:100,right:100},
    ...opts
  });
  const cell = (text, w, opts={}, runOpts={}) => new TableCell({
    ...cellOpts(w, opts),
    children:[new Paragraph({
      alignment: opts.center ? AlignmentType.CENTER : AlignmentType.LEFT,
      children:[new TextRun({text:esc(text), font:'Arial', size:18, ...runOpts})]
    })]
  });
  const headerCell = (text, w, span=1) => new TableCell({
    ...cellOpts(w),
    columnSpan: span,
    shading: { fill:'D0D0D0', type:ShadingType.CLEAR },
    children:[new Paragraph({
      alignment: AlignmentType.CENTER,
      children:[new TextRun({text:esc(text), font:'Arial', size:18, bold:true})]
    })]
  });
  const para = (text, opts={}) => new Paragraph({
    children:[new TextRun({text:esc(text), font:'Arial', size:20, ...opts})]
  });

  // ── Halaman landscape A4 ──
  // Content width landscape: 16838 - 1440(top) - 1440(bot) sebagai tinggi
  // Landscape A4: 16838 × 11906 DXA
  const PAGE_W = 15120; // usable width landscape A4 dengan margin 0.7"
  const COL_NO = 400;
  const COL_URAIAN = 2800;
  // Kolom pelaksana — bagi rata sesuai jumlah pelaksana
  const pelaksana = (f.pelaksana||[]).filter(p=>p);
  const nPel = Math.max(pelaksana.length, 1);
  const COL_PEL = Math.floor(2400 / nPel);
  const pelTotalW = COL_PEL * nPel;
  const COL_SYARAT = 1800;
  const COL_WAKTU  = 900;
  const COL_OUTPUT = 1800;
  const COL_KET    = 1200;
  const totalW = COL_NO + COL_URAIAN + pelTotalW + COL_SYARAT + COL_WAKTU + COL_OUTPUT + COL_KET;

  // ── Tabel Header Identitas ──
  const HALF = Math.floor(PAGE_W / 2);
  const tblIdentitas = new Table({
    width:{size:PAGE_W, type:WidthType.DXA},
    columnWidths:[HALF, HALF],
    rows:[
      new TableRow({ children:[
        new TableCell({ ...cellOpts(HALF), rowSpan:4,
          children:[
            para('Nomor SOP : '+esc(f.nomorSOP), {bold:true}),
            para('Nama SOP  : '+esc(f.namaSOP),  {bold:true}),
            para('Unit E-III: '+esc(f.eselon3)),
            para('Unit E-IV : '+esc(f.eselon4)),
          ]
        }),
        cell('Tgl Pembuatan : '+fmt(f.tglPembuatan), HALF),
      ]}),
      new TableRow({ children:[ cell('Tgl Revisi    : '+fmt(f.tglRevisi), HALF) ]}),
      new TableRow({ children:[ cell('Tgl Efektif   : '+fmt(f.tglEfektif), HALF) ]}),
      new TableRow({ children:[ cell('Disahkan Oleh : '+esc(f.disahkanOleh), HALF) ]}),
    ]
  });

  // ── Helper: buat tabel section (Dasar Hukum, Kualifikasi, dll) ──
  const makeSectionTable = (title, items) => {
    const clean = (items||[]).filter(x=>x);
    if (!clean.length) return null;
    return new Table({
      width:{size:PAGE_W, type:WidthType.DXA},
      columnWidths:[PAGE_W/5|0, PAGE_W - (PAGE_W/5|0)],
      rows:[
        new TableRow({ children:[
          new TableCell({
            ...cellOpts(PAGE_W),
            columnSpan:2,
            shading:{fill:'E8E8E8', type:ShadingType.CLEAR},
            children:[new Paragraph({children:[new TextRun({text:title,font:'Arial',size:18,bold:true})]})]
          })
        ]}),
        ...clean.map((item,i) => new TableRow({ children:[
          cell(String(i+1)+'.', PAGE_W/5|0),
          cell(item, PAGE_W - (PAGE_W/5|0))
        ]}))
      ]
    });
  };

  // ── Tabel Prosedur (Langkah) ──
  // Header row 1: No | Uraian Kegiatan | Pelaksana (colspan nPel) | Mutu Baku (colspan 3) | Ket
  // Header row 2: (kosong) | (kosong) | pel1 | pel2 | ... | Persyaratan | Waktu | Output | (kosong)
  const tblProsedurRows = [
    // Header baris 1
    new TableRow({ children:[
      headerCell('No', COL_NO),
      headerCell('Uraian Kegiatan', COL_URAIAN),
      headerCell('Pelaksana', pelTotalW, nPel),
      headerCell('Mutu Baku', COL_SYARAT+COL_WAKTU+COL_OUTPUT, 3),
      headerCell('Ket', COL_KET),
    ]}),
    // Header baris 2 — sub-header pelaksana + mutu baku
    new TableRow({ children:[
      headerCell('', COL_NO),
      headerCell('', COL_URAIAN),
      ...pelaksana.map(p => headerCell(p, COL_PEL)),
      ...(pelaksana.length === 0 ? [headerCell('Pelaksana', COL_PEL)] : []),
      headerCell('Persyaratan', COL_SYARAT),
      headerCell('Waktu', COL_WAKTU),
      headerCell('Output', COL_OUTPUT),
      headerCell('', COL_KET),
    ]}),
    // Baris data
    ...(f.langkah||[]).filter(l=>l.aktivitas).map((l,i) => {
      const pelCells = Array.from({length:nPel}, (_,pi) =>
        new TableCell({
          ...cellOpts(COL_PEL),
          children:[new Paragraph({
            alignment: AlignmentType.CENTER,
            children:[new TextRun({
              text: l.pelaksana===pi ? String.fromCharCode(10003) : '',
              font:'Arial', size:18, bold:true
            })]
          })]
        })
      );
      return new TableRow({ children:[
        cell(String(i+1), COL_NO, {center:true}),
        cell(l.aktivitas, COL_URAIAN),
        ...pelCells,
        cell(l.persyaratan||'', COL_SYARAT),
        cell(l.waktu||'', COL_WAKTU, {center:true}),
        cell(l.output||'', COL_OUTPUT),
        cell(l.keterangan||'', COL_KET),
      ]});
    })
  ];
  const tblProsedur = new Table({
    width:{size:totalW, type:WidthType.DXA},
    columnWidths:[COL_NO, COL_URAIAN, ...Array(nPel).fill(COL_PEL), COL_SYARAT, COL_WAKTU, COL_OUTPUT, COL_KET],
    rows: tblProsedurRows
  });

  // ── Susun konten dokumen ──
  const children = [
    new Paragraph({ alignment:AlignmentType.CENTER,
      children:[new TextRun({text:esc(f.instansi), font:'Arial', size:22, bold:true})] }),
    new Paragraph({ alignment:AlignmentType.CENTER,
      children:[new TextRun({text:esc(f.alamat), font:'Arial', size:18})] }),
    new Paragraph({ children:[] }), // spacer
    tblIdentitas,
    new Paragraph({ children:[] }),
  ];

  // Section tables
  const secs = [
    ['Dasar Hukum',           f.dasarHukum],
    ['Kualifikasi Pelaksana', f.kualifikasiPelaksana],
    ['Keterkaitan',           f.keterkaitan],
    ['Peralatan / Perlengkapan', f.peralatan],
    ['Peringatan',            f.peringatan],
    ['Pencatatan dan Pendataan', f.pencatatan],
  ];
  secs.forEach(([title, items]) => {
    const t = makeSectionTable(title, items);
    if (t) { children.push(t); children.push(new Paragraph({children:[]})); }
  });

  children.push(new Paragraph({
    children:[new TextRun({text:'Prosedur', font:'Arial', size:20, bold:true})]
  }));
  children.push(tblProsedur);

  // ── Buat dokumen landscape A4 ──
  const doc = new Document({
    sections:[{
      properties:{
        page:{
          size:{ width:11906, height:16838, orientation: PageOrientation.LANDSCAPE },
          margin:{ top:720, bottom:720, left:720, right:720 }
        }
      },
      children
    }]
  });

  try {
    const blob = await Packer.toBlob(doc);
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = (f.nomorSOP||'SOP').replace(/[/\\:*?"<>|]/g,'-') + ' - ' + (f.namaSOP||'SOP').slice(0,50) + '.docx';
    a.click();
    URL.revokeObjectURL(url);
    toast('✅ File Word berhasil diunduh!');
  } catch(e) {
    toast('❌ Gagal export: '+e.message, 'err');
    console.error(e);
  }
}


// ══ EXPORT KE JPG ══
// Export flowchart SVG langsung ke JPG — lebih ringan untuk Google Drive & SOPI
// Menggunakan Canvas API (built-in browser, tidak perlu library tambahan)
async function exportToPDF() {  // nama fungsi tetap agar tidak perlu ganti tombol
  const f = state.form;

  // Cek apakah ada SVG flowchart yang ter-render
  const svgEl = document.querySelector('#previewPanel svg');
  if (!svgEl) {
    // Coba switch ke flowchart dulu
    if (typeof switchPreview === 'function') switchPreview('flow');
    setTimeout(() => exportToPDF(), 500);
    return;
  }

  try {
    toast('⏳ Membuat JPG...');
    const svgData  = new XMLSerializer().serializeToString(svgEl);
    const svgBlob  = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const svgUrl   = URL.createObjectURL(svgBlob);

    const img = new Image();
    img.onload = () => {
      // Render ke canvas dengan skala 2x untuk kualitas tinggi
      const scale  = 2;
      const canvas = document.createElement('canvas');
      canvas.width  = img.width  * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(svgUrl);

      // Download sebagai JPG
      const link = document.createElement('a');
      const nama  = (f.nomorSOP||'SOP').replace(/[/\\:*?"<>|]/g,'-').slice(0,40);
      link.download = 'Flowchart - ' + nama + '.jpg';
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.click();
      toast('✅ Flowchart berhasil diunduh sebagai JPG!');
    };
    img.onerror = () => {
      URL.revokeObjectURL(svgUrl);
      toast('❌ Gagal render SVG ke JPG', 'err');
    };
    img.src = svgUrl;
  } catch(e) {
    toast('❌ Gagal export JPG: ' + e.message, 'err');
    console.error(e);
  }
}


// ══ TOAST ══
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === 'err' ? ' err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3000);
}

// ══ MODAL ══
function openModal(id) { document.getElementById(id).classList.add('on'); }
function closeModal(id) { document.getElementById(id).classList.remove('on'); }

// ══ TAB ══
function setTab(i) {
  state.tab = i;
  [0,1,2].forEach(j => {
    const b = document.getElementById('tab'+j);
    const classes = ['on','on amber','on purple'];
    if (j===i) b.className = 'tab-btn '+classes[j];
    else b.className = 'tab-btn ' + (['','amber','purple'][j]);
  });
  render();
  if (i===2) loadDrafts();
}

// ══ FORM HELPERS ══
function getFormVal(id) { const el=document.getElementById(id); return el?el.value:''; }
function setFormVal(id, v) { const el=document.getElementById(id); if(el) el.value=v; }

function syncFormFromDOM() {
  // Sync identitas
  const fields = ['nomorSOP','namaSOP','eselon3','eselon4','instansi','alamat',
                  'tglPembuatan','tglRevisi','tglEfektif','disahkanOleh','deskripsi'];
  fields.forEach(k => { const v=getFormVal('f_'+k); if(v!==undefined) state.form[k]=v; });
  // Sync multifields
  const mfKeys = ['dasarHukum','kualifikasiPelaksana','keterkaitan','peralatan','peringatan','pencatatan','pelaksana'];
  mfKeys.forEach(k => {
    const items=[];
    document.querySelectorAll('.mf-item-'+k).forEach(el=>items.push(el.value));
    if (items.length) state.form[k]=items;
  });
  // Sync langkah
  const langkah=[];
  document.querySelectorAll('.step-block').forEach((blk,i)=>{
    langkah.push({
      aktivitas: (blk.querySelector('.step-aktivitas')||{value:''}).value,
      pelaksana: +(blk.querySelector('.step-pelaksana')||{value:0}).value,
      persyaratan: (blk.querySelector('.step-persyaratan')||{value:''}).value,
      waktu: (blk.querySelector('.step-waktu')||{value:''}).value,
      output: (blk.querySelector('.step-output')||{value:''}).value,
      keterangan: (blk.querySelector('.step-keterangan')||{value:''}).value
    });
  });
  if (langkah.length) state.form.langkah=langkah;
}

// ══ RENDER ══
function render() {
  const cont = document.getElementById('mainContent');
  if (state.tab===0) cont.innerHTML = renderFormView();
  else if (state.tab===1) cont.innerHTML = renderPreviewView();
  else cont.innerHTML = renderAdminView();
  bindEvents();
}

// ══ TAB 0: FORM VIEW ══
function renderFormView() {
  const f = state.form;
  let h = '';

  // DROP ZONE / FILE STATUS
  if (state.fileState === 'idle') {
    h += `<div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".docx,.doc">
      <div style="font-size:36px;margin-bottom:8px;">📂</div>
      <div style="font-weight:700;font-size:15px;margin-bottom:6px;">Klik atau Drag &amp; Drop File SOP (.docx)</div>
      <div style="font-size:12px;color:var(--mu2);margin-bottom:12px;">Data otomatis masuk ke form</div>
      <div style="display:flex;gap:6px;justify-content:center;">
        <span class="badge">.docx</span>
        <span class="badge" style="color:var(--mu2);border-color:rgba(255,255,255,.1);">.doc</span>
        <span class="badge" style="color:var(--mu);border-color:rgba(255,255,255,.08);">Format SOP Ditjen Badilag</span>
      </div>
      <div style="margin-top:10px;font-size:11px;color:var(--mu);">— atau isi form manual di bawah —</div>
    </div>`;
  } else if (state.fileState === 'parsing') {
    h += `<div class="status-bar loading">
      <span style="font-size:20px;">⚙️</span>
      <div style="flex:1;">
        <div style="font-weight:700;color:var(--cyan);margin-bottom:4px;">Membaca file Word...</div>
        <div style="font-size:11px;color:var(--mu2);">${state.fileName}</div>
        <div class="progress-bar"><div class="progress-fill" id="pBar"></div></div>
      </div>
    </div>`;
    setTimeout(()=>{ const pb=document.getElementById('pBar'); if(pb) pb.style.width='80%'; }, 100);
  } else if (state.fileState === 'done') {
    h += `<div class="status-bar ok">
      <span style="font-size:20px;">✅</span>
      <div>
        <div style="font-weight:700;color:var(--green);font-size:13px;">File berhasil dibaca!</div>
        <div style="font-size:11px;color:var(--mu2);">${state.fileName} · ${state.parseInfo}</div>
      </div>
      <button class="btn btn-secondary" onclick="resetFile()" style="margin-left:auto;padding:6px 12px;font-size:12px;">🔄 Ganti File</button>
    </div>`;
  } else if (state.fileState === 'error') {
    h += `<div class="status-bar err">
      <span style="font-size:20px;">❌</span>
      <div>
        <div style="font-weight:700;color:var(--red);font-size:13px;">Gagal membaca file</div>
        <div style="font-size:11px;color:var(--mu2);">${state.parseInfo}</div>
      </div>
      <button class="btn btn-secondary" onclick="resetFile()" style="margin-left:auto;padding:6px 12px;font-size:12px;">🔄 Coba Lagi</button>
    </div>`;
  }

  // IDENTITAS SOP
  h += `<div class="card">
    <div class="card-title cyan">🏛️ Identitas SOP</div>
    <div class="grid2">
      ${inp('Nomor SOP','nomorSOP',f.nomorSOP,'4359/DjA/OT.01.3/...')}
      ${inp('Nama SOP','namaSOP',f.namaSOP,'Nama prosedur...')}
      ${inp('Unit Eselon III','eselon3',f.eselon3,'Bagian/Subdit...')}
      ${inp('Unit Eselon IV','eselon4',f.eselon4,'Kasubbag/Kasi...')}
      ${inp('Tanggal Pembuatan','tglPembuatan',f.tglPembuatan,'','date')}
      ${inp('Tanggal Revisi','tglRevisi',f.tglRevisi,'','date')}
      ${inp('Tanggal Efektif','tglEfektif',f.tglEfektif,'','date')}
      ${inp('Disahkan Oleh','disahkanOleh',f.disahkanOleh,'Jabatan pengesah...')}
    </div>
    ${inp('Instansi','instansi',f.instansi,'')}
    ${inp('Alamat','alamat',f.alamat,'')}
  </div>`;

  // MULTIFIELDS
  const sections = [
    {key:'dasarHukum',       label:'📜 Dasar Hukum',              ph:'Nama peraturan...'},
    {key:'kualifikasiPelaksana',label:'👥 Kualifikasi Pelaksana',  ph:'Kompetensi...'},
    {key:'keterkaitan',      label:'🔗 Keterkaitan',               ph:'SOP terkait...'},
    {key:'peralatan',        label:'🛠️ Peralatan / Perlengkapan', ph:'Nama alat...'},
    {key:'peringatan',       label:'⚠️ Peringatan',               ph:'Hal penting...'},

  sections.forEach(s => {

    <div style="font-size:11px;color:var(--amber);margin-top:6px;">💡 Urutan ini menentukan kolom di flowchart</div>

  // LANGKAH
  h += `<div class="card">

  f.langkah.forEach((l, i) => {
    const pelOpts = (f.pelaksana||['']).map((p,j)=>`<option value="${j}"${l.pelaksana===j?' selected':''}>${p||'Pelaksana '+(j+1)}</option>`).join('');
    h += `<div class="step-wrap step-block${!l.aktivitas||!l.waktu?' warn-empty':''}" data-idx="${i}">
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <div class="step-num">${i+1}</div>
        ${!l.aktivitas?'<span class="step-warn-badge">⚠ Aktivitas kosong</span>':!l.waktu?'<span class="step-warn-badge">⚠ Waktu kosong</span>':''}
        <textarea class="finput step-aktivitas" rows="2" placeholder="Deskripsi aktivitas..."
          style="margin-bottom:0;flex:1;">${esc(l.aktivitas)}</textarea>
        ${f.langkah.length>1?`<button onclick="delLangkah(${i})" style="background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.3);color:var(--red);border-radius:8px;padding:0 9px;height:36px;cursor:pointer;font-size:13px;flex-shrink:0;">✕</button>`:''}
      </div>
      <div class="step-grid">
        <div>
          <div class="step-sublabel amber">Persyaratan</div>
          <input class="step-input step-persyaratan" value="${esc(l.persyaratan)}" placeholder="Dokumen/syarat...">
        </div>
        <div>
          <div class="step-sublabel mu">Pelaksana</div>
          <select class="step-select step-pelaksana">${pelOpts}</select>
        </div>
        <div>
          <div class="step-sublabel mu">Waktu</div>
          <input class="step-input step-waktu" value="${esc(l.waktu)}" placeholder="1 hari">
        </div>
        <div>
          <div class="step-sublabel mu">Output</div>
          <input class="step-input step-output" value="${esc(l.output)}" placeholder="Hasil...">
        </div>
        <div>
          <div class="step-sublabel ket">Ket.</div>
          <input class="step-input step-keterangan" value="${esc(l.keterangan||'')}" placeholder="Keterangan...">
        </div>
      </div>
    </div>`;
  });
  h += `<button class="btn" onclick="addLangkah()"
    style="background:rgba(6,214,160,.07);border:1px solid rgba(6,214,160,.18);color:var(--green);
    padding:9px;width:100%;justify-content:center;font-size:13px;margin-top:4px;">
    + Tambah Langkah
  </button></div>`;

  // SUBMIT BUTTON
  // Tombol action bar: Export Word + Kirim Review
  h += `<div style="display:flex;gap:10px;margin-bottom:8px;">
    <button onclick="exportToWord()" style="flex:1;padding:12px;background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">
      📄 Export Word
    </button>
    <button onclick="switchPreview('flow');setTimeout(exportToPDF,500);" style="flex:1;padding:12px;background:linear-gradient(135deg,#dc2626,#ef4444);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">
      🖼️ Export JPG
    </button>
  </div>`;
  h += `<button class="btn btn-primary" onclick="handleKirim()">📤 Kirim untuk Review Admin</button>`;

  return h;
}

function inp(label, key, val, ph, type) {
  return `<div>
    <label class="flabel">${label}</label>
    <input class="finput f-field" id="f_${key}" type="${type||'text'}" value="${esc(val||'')}" placeholder="${ph||''}" style="margin-bottom:0;">
  </div>`;
}

function renderMultiField(key, label, items, ph) {
  let h = `<label class="flabel amber">${label}</label>`;
  items.forEach((item, i) => {
    h += `<div class="mf-row">
      <span class="mf-num">${i+1}.</span>
      <input class="mf-input mf-item-${key}" value="${esc(item)}" placeholder="${ph}">
      ${items.length>1?`<button class="mf-del" onclick="delMF('${key}',${i})">✕</button>`:''}
    </div>`;
  });
  h += `<button class="mf-add" onclick="addMF('${key}')">+ Tambah</button>`;
  return h;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function switchPreview(mode) {

  document.getElementById('btnDoc').style.cssText = mode==='doc'
    ? 'flex:1;padding:9px;font-size:13px;background:var(--cyan);color:#000;'

    ? renderFlowchart(f) : renderDocPreview(f);
}

// ══ FLOWCHART SYMBOL HELPER ══
// tipe: 'process' (default), 'decision' (belah ketupat), 'input' (parallelogram)
// Digunakan di renderFlowchart untuk menggambar shape sesuai tipe langkah
function getSymbol(tipe, text, cx, cy, col, boxW, boxH) {
  const hw = boxW / 2, hh = boxH / 2;
  let shape = '';
  let textEl = '';

  // Wrap teks menjadi maks 3 baris
  const words = (text || '').split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    if ((cur + ' ' + w).trim().length > 18) { lines.push(cur.trim()); cur = w; }
    else cur = (cur + ' ' + w).trim();
  });
  if (cur) lines.push(cur.trim());
  const tLines = lines.slice(0, 3);
  const lineH = 12;
  const tStartY = cy - (tLines.length * lineH) / 2 + 5;
  tLines.forEach((ln, li) => {
    textEl += `<text x="${cx + 4}" y="${tStartY + li * lineH}" text-anchor="middle"
      font-size="8" fill="${col.text}" font-family="sans-serif">${ln}</text>`;
  });

  switch (tipe) {
    case 'decision': {
      // Belah ketupat — lebar diperbesar agar muat teks
      const dw = Math.max(boxW * 0.6, 44), dh = Math.max(boxH * 0.55, 22);
      const pts = `${cx},${cy - dh} ${cx + dw},${cy} ${cx},${cy + dh} ${cx - dw},${cy}`;
      shape = `<polygon points="${pts}"
        fill="${col.fill}" stroke="${col.stroke}" stroke-width="1.5" filter="url(#fsh)"/>`;
      break;
    }
    case 'input': {
      // Parallelogram (dokumen input/output)
      const skew = 10;
      const pts = `${cx - hw + skew},${cy - hh} ${cx + hw + skew},${cy - hh}
                   ${cx + hw - skew},${cy + hh} ${cx - hw - skew},${cy + hh}`;
      shape = `<polygon points="${pts}"
        fill="${col.fill}" stroke="${col.stroke}" stroke-width="1.5" filter="url(#fsh)"/>`;
      break;
    }
    default: {
      // Proses — persegi panjang rounded (bawaan)
      shape = `<rect x="${cx - hw}" y="${cy - hh}" width="${boxW}" height="${boxH}"
        rx="6" fill="${col.fill}" stroke="${col.stroke}" stroke-width="1.5" filter="url(#fsh)"/>`;
    }
  }
  return shape + textEl;
}

function renderFlowchart(f) {
  const langkah  = f.langkah  || [];
  const pelaksana = f.pelaksana || [];
  if (!langkah.length || !pelaksana.length)
    return '<div style="text-align:center;padding:40px;color:var(--mu2);">Isi langkah dan pelaksana di form terlebih dahulu</div>';

  // ── Layout constants ──
  const COL_W  = 130, HDR_H = 44, PAD_X = 16, PAD_Y = 20;
  const BOX_W  = 108, BOX_H = 52;   // persegi panjang = proses
  const OVAL_H = 28, OVAL_W = 80;   // oval = mulai/selesai
  const ROW_H  = 90;                 // jarak antar baris

  const totalCols = pelaksana.length;
  const totalRows = langkah.length;
  const svgW = PAD_X*2 + totalCols * COL_W;
  const svgH = PAD_Y + HDR_H + 30 + OVAL_H + (totalRows * ROW_H) + ROW_H + 20;

  const colCX = pi => PAD_X + pi * COL_W + COL_W / 2;  // center-x per kolom
  const rowCY = i  => PAD_Y + HDR_H + 30 + OVAL_H + 10 + i * ROW_H + BOX_H / 2;

  // ── Warna per pelaksana ──
  const COLORS = [
    {fill:'#dbeafe',stroke:'#3b82f6',text:'#1e40af'},
    {fill:'#dcfce7',stroke:'#22c55e',text:'#166534'},
    {fill:'#fef9c3',stroke:'#eab308',text:'#713f12'},
    {fill:'#fce7f3',stroke:'#ec4899',text:'#9d174d'},
    {fill:'#ede9fe',stroke:'#8b5cf6',text:'#4c1d95'},
    {fill:'#ffedd5',stroke:'#f97316',text:'#7c2d12'},
    {fill:'#cffafe',stroke:'#06b6d4',text:'#164e63'},
    {fill:'#f0fdf4',stroke:'#4ade80',text:'#14532d'},
  ];

  // Fungsi wrap text
  function wrapText(str, maxChar) {
    str = (str || '').trim();
    if (str.length <= maxChar) return [str];
    const words = str.split(' ');
    const lines = [];
    let cur = '';
    words.forEach(w => {
      if ((cur + ' ' + w).trim().length > maxChar) { lines.push(cur.trim()); cur = w; }
      else cur = (cur + ' ' + w).trim();
    });
    if (cur) lines.push(cur.trim());
    return lines.slice(0, 3);
  }

  let svg = `<svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:${svgW}px;">`;
  svg += `<defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="fsh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000018"/>
    </filter>
  </defs>`;

  // ── Header kolom pelaksana ──
  pelaksana.forEach((p, pi) => {
    const cx = PAD_X + pi * COL_W;
    const col = COLORS[pi % COLORS.length];
    svg += `<rect x="${cx}" y="${PAD_Y}" width="${COL_W}" height="${HDR_H}"
      fill="${col.fill}" stroke="${col.stroke}" stroke-width="0.8"/>`;
    const pWords = (p || '').split(' ');
    const pL1 = pWords.slice(0, 2).join(' ').slice(0, 18);
    const pL2 = pWords.slice(2).join(' ').slice(0, 18);
    svg += `<text x="${cx + COL_W/2}" y="${PAD_Y + (pL2?14:20)}" text-anchor="middle"
      font-size="9" font-weight="700" fill="${col.text}" font-family="sans-serif">${pL1}</text>`;
    if (pL2) svg += `<text x="${cx + COL_W/2}" y="${PAD_Y + 26}" text-anchor="middle"
      font-size="9" fill="${col.text}" font-family="sans-serif">${pL2}</text>`;
    // Garis kolom vertikal (dashed)
    svg += `<line x1="${cx + COL_W/2}" y1="${PAD_Y + HDR_H}"
      x2="${cx + COL_W/2}" y2="${svgH - 20}" stroke="${col.stroke}" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.4"/>`;
  });

  // ── MULAI — oval ──
  const startCol  = langkah[0] ? langkah[0].pelaksana : 0;
  const startCX   = colCX(startCol);
  const startCY   = PAD_Y + HDR_H + 18;
  svg += `<ellipse cx="${startCX}" cy="${startCY}" rx="${OVAL_W/2}" ry="${OVAL_H/2}"
    fill="#1e293b" filter="url(#fsh)"/>`;
  svg += `<text x="${startCX}" y="${startCY + 1}" text-anchor="middle" dominant-baseline="middle"
    font-size="10" font-weight="700" fill="#fff" font-family="sans-serif" letter-spacing="1">MULAI</text>`;

  // Panah dari MULAI ke langkah 1
  const firstCY = rowCY(0);
  svg += `<line x1="${startCX}" y1="${startCY + OVAL_H/2}"
    x2="${colCX(langkah[0]?langkah[0].pelaksana:0)}" y2="${firstCY - BOX_H/2 - 2}"
    stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>`;

  // ── Langkah-langkah — persegi panjang (rounded) ──
  langkah.forEach((l, i) => {
    const pi  = Math.min(l.pelaksana || 0, pelaksana.length - 1);
    const cx  = colCX(pi);
    const cy  = rowCY(i);
    const col = COLORS[pi % COLORS.length];
    const bx  = cx - BOX_W/2, by = cy - BOX_H/2;

    // Shape proses — gunakan getSymbol() sesuai tipe langkah
    // Tentukan tipe: 'decision' jika aktivitas mengandung kata keputusan/cek/verifikasi
    const isDecision = /\b(verifikasi|cek|periksa|sesuai|setuju|approved|decision|apakah|jika|bila)\b/i.test(l.aktivitas||'');
    const isInput    = /\b(input|upload|isi|mengisi|melengkapi|menyerahkan|lampirkan)\b/i.test(l.aktivitas||'');
    const symTipe    = isDecision ? 'decision' : isInput ? 'input' : 'process';
    svg += getSymbol(symTipe, l.aktivitas, cx, cy, col, BOX_W, BOX_H);

    // Nomor langkah (circle di sudut kiri atas)
    svg += `<circle cx="${bx + 12}" cy="${by + 12}" r="9" fill="${col.stroke}"/>`;
    svg += `<text x="${bx + 12}" y="${by + 12}" text-anchor="middle" dominant-baseline="middle"
      font-size="8" font-weight="700" fill="#fff" font-family="sans-serif">${i+1}</text>`;

    // Waktu (kecil di bawah kotak)
    if (l.waktu) {
      svg += `<text x="${cx}" y="${by + BOX_H - 5}" text-anchor="middle"
        font-size="7" fill="#94a3b8" font-family="sans-serif">⏱ ${l.waktu}</text>`;
    }

    // ── Panah ke langkah berikutnya ──
    if (i < langkah.length - 1) {
      const nextPi = Math.min(langkah[i+1].pelaksana || 0, pelaksana.length - 1);
      const nextCX = colCX(nextPi);
      const nextCY = rowCY(i + 1);
      const fromX  = cx, fromY = cy + BOX_H/2;
      const toX    = nextCX, toY = nextCY - BOX_H/2 - 2;

      if (Math.abs(fromX - toX) < 8) {
        // Langsung lurus
        svg += `<line x1="${fromX}" y1="${fromY}" x2="${toX}" y2="${toY}"
          stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>`;
      } else {
        // Elbow — turun setengah lalu geser ke kolom berikutnya
        const midY = fromY + (toY - fromY) * 0.45;
        svg += `<path d="M ${fromX} ${fromY} L ${fromX} ${midY} L ${toX} ${midY} L ${toX} ${toY}"
          fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>`;
      }
    }
  });

  // ── SELESAI — pentagon/home shape ──
  const lastL    = langkah[langkah.length - 1];
  const lastPi   = Math.min(lastL.pelaksana || 0, pelaksana.length - 1);
  const endCX    = colCX(lastPi);
  const endCY    = rowCY(langkah.length - 1) + BOX_H/2 + ROW_H * 0.65;
  const endW = 80, endH = 28;
  const ex = endCX, ey = endCY;
  // Arrow to end
  svg += `<line x1="${colCX(lastPi)}" y1="${rowCY(langkah.length-1)+BOX_H/2}"
    x2="${ex}" y2="${ey - endH/2 - 2}" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>`;
  // Pentagon (end shape)
  const pts = [
    [ex - endW/2, ey - endH/2],
    [ex + endW/2, ey - endH/2],
    [ex + endW/2, ey + endH/2 - 6],
    [ex,          ey + endH/2 + 4],
    [ex - endW/2, ey + endH/2 - 6],
  ].map(p => p.join(',')).join(' ');
  svg += `<polygon points="${pts}" fill="#1e293b" filter="url(#fsh)"/>`;

}

function secTable(title, items) {
  // Filter: buang item yang isinya hanya label section (sisa artefak parser)
  const SECTION_LABELS = /^(peralatan\s*[/\\]?\s*perlengkapan|peralatan|keterkaitan|peringatan|pencatatan dan pendataan|pencatatan|dasar hukum|kualifikasi pelaksana|pelaksana|mutu baku)\s*[:/]?\s*$/i;
  const clean = (items||[]).filter(x => x && !SECTION_LABELS.test(x.trim()));
  if (!clean.length) return '';
  return `<table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:4px;">
    <tr><th style="border:1px solid #000;background:#f0f0f0;padding:4px 6px;text-align:left;" colspan="2">${title}</th></tr>

}

// ══ BIND EVENTS ══
function bindEvents() {
  // File input
  const fi = document.getElementById('fileInput');
  if (fi) fi.addEventListener('change', function(e) {
    const file = e.target.files && e.target.files[0];
    if (file) processFile(file);
    e.target.value = '';
  });

  // Drop zone
  const dz = document.getElementById('dropZone');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => {
      e.preventDefault(); dz.classList.remove('drag-over');
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) processFile(file);
    });
  }

  // Auto-save on field change
  document.querySelectorAll('.f-field').forEach(el => {
    el.addEventListener('change', () => syncFormFromDOM());
  });
}

// ══ FILE PROCESSING ══
function processFile(file) {
  // Validasi: cek extension DAN MIME type (untuk file dari WhatsApp/mobile yang nama berubah)
  const validExt  = file.name.match(/\.(docx|doc)$/i);
  const validMime = file.type && (
    file.type.includes('word') ||
    file.type.includes('document') ||
    file.type.includes('officedocument') ||
    file.type.includes('msword') ||
    file.type === 'application/octet-stream' // beberapa mobile kirim generic
  );
  if (!validExt && !validMime) {
    state.fileState='error';
    state.parseInfo='Format tidak didukung. Gunakan file .docx atau .doc (MIME: '+file.type+', nama: '+file.name+')';
    render(); return;
  }
  state.fileName = file.name;
  state.fileState = 'parsing';
  render();
  file.arrayBuffer().then(ab => {
    if (!window.mammoth) throw new Error('Library mammoth belum dimuat, coba lagi');
    // Ekstrak dua format sekaligus: HTML (untuk tabel) + teks mentah (untuk metadata)
    return Promise.all([
      window.mammoth.convertToHtml({ arrayBuffer: ab }),
      window.mammoth.extractRawText({ arrayBuffer: ab })
    ]);
  }).then(([htmlResult, textResult]) => {
    const raw  = textResult.value || '';
    const html = htmlResult.value || '';
    if (raw.length < 50) throw new Error('File kosong atau tidak bisa dibaca');

    // Tahap 1: parse metadata & struktur dari teks biasa
    const parsed = parseSOPFromText(raw);

    // Tahap 2a: overwrite section dari <p>/<li> HTML (format multi-tabel)
    const ktItems = parseSectionFromHTML(html, 'KETERKAITAN');
    if (ktItems.length > 0) parsed.keterkaitan = ktItems.concat(['']);
    const prItems = parseSectionFromHTML(html, 'PERINGATAN');
    if (prItems.length > 0) parsed.peringatan = prItems.concat(['']);

    // Tahap 2b: fallback — baca section dari <td> tabel (format single-tabel seperti SOP Cuti)
    // Dipakai kalau section masih kosong setelah parser teks dan parser HTML
    const tblSections = parseSectionFromTable(html);
    const SECTION_KEYS = ['dasarHukum','kualifikasiPelaksana','keterkaitan','peralatan','peringatan','pencatatan'];
    SECTION_KEYS.forEach(key => {
      const isEmpty = !parsed[key] || parsed[key].filter(x=>x).length === 0;
      if (isEmpty && tblSections[key] && tblSections[key].length > 0) {
        parsed[key] = tblSections[key];
      }
    });

    // Tahap 3: baca tabel prosedur dengan parseSOPPro (via parseTabelAktivitas)
    const langkahDariTabel = parseTabelAktivitas(html);

    state.form = parsed;

    // Gunakan populateForm untuk set langkah — sesuai saran Gemini
    // populateForm juga normalisasi field dan trigger render
    if (langkahDariTabel.length > 0) {
      // Set dulu ke state sebelum populateForm (supaya render pakai data terbaru)
      state.form.langkah = langkahDariTabel;
    }
    // Debug trace (console.log agar kompatibel semua browser termasuk mobile)
    const _dbg = console.log.bind(console);
    _dbg('[SOP Parser] keterkaitan:', parsed.keterkaitan);
    _dbg('[SOP Parser] peringatan:', parsed.peringatan);
    _dbg('[SOP Parser] langkah count:', parsed.langkah.filter(l=>l.aktivitas).length);
    _dbg('[SOP Parser] langkah sample:', parsed.langkah.slice(0,2));
    const lc = parsed.langkah.filter(l=>l.aktivitas).length;
    const pc = parsed.pelaksana.filter(p=>p).length;
    const src = langkahDariTabel.length > 0 ? ' (dari tabel Word)' : ' (dari teks biasa)';
    const ketWarn = langkahDariTabel.length > 0 && langkahDariTabel.some(l=>l.keterangan)
      ? ' ✓ kolom Ket terbaca' : '';
    state.parseInfo = lc+' langkah '+src+', '+pc+' pelaksana terdeteksi'+ketWarn;
    if (lc === 0) {
      state.parseInfo += ' — ⚠️ Tabel prosedur belum berisi langkah SOP. Isi langkah secara manual di bawah, atau pastikan dokumen Word sudah memiliki baris prosedur yang terisi.';
    }
    state.fileState = 'done';
    render();
  }).catch(e => {
    state.fileState='error'; state.parseInfo='Gagal: '+e.message;
    render();
  });
}

function resetFile() {
  state.fileState='idle'; state.fileName=''; state.parseInfo='';

  if (state.ctx) {

    if (state.ctx.e4) state.form.eselon4 = decodeURIComponent(state.ctx.e4);
  }
  render();
}

function handleKirim() {
  syncFormFromDOM();
  const f = state.form;
  if (!f.namaSOP.trim()) { toast('⚠ Nama SOP wajib diisi','err'); return; }
  const filledLangkah = f.langkah.filter(l=>l.aktivitas.trim());
  if (!filledLangkah.length) { toast('⚠ Minimal 1 langkah prosedur wajib diisi','err'); return; }
  // Validasi kolom kosong (saran Gemini): highlight + scroll ke baris bermasalah
  const emptyWaktu = f.langkah.findIndex(l => l.aktivitas.trim() && !l.waktu.trim());
  if (emptyWaktu >= 0 && !state._forceSubmit) {
    toast('⚠ Langkah '+(emptyWaktu+1)+' belum ada Waktu (ditandai kuning). Klik Kirim lagi untuk tetap lanjutkan.','err');
    state._forceSubmit = true;
    setTimeout(() => {
      const el = document.querySelector('[data-idx="'+emptyWaktu+'"]');
      if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }, 200);
    return;
  }
  state._forceSubmit = false;

  // Pre-fill modal dari context
  const nip  = state.ctx ? state.ctx.nip  : '';
  const nama = state.ctx ? decodeURIComponent(state.ctx.nama||'') : '';
  const mNIP  = document.getElementById('mNIP');
  const mNama = document.getElementById('mNama');
  if (mNIP  && !mNIP.value  && nip)  mNIP.value  = nip;
  if (mNama && !mNama.value && nama) mNama.value = nama;

  // Isi info summary di modal
  const info = document.getElementById('mKirimInfo');
  if (info) info.innerHTML = `
    <div style="color:var(--tx);font-weight:700;margin-bottom:4px;">${f.namaSOP}</div>
    <div>Nomor: ${f.nomorSOP||'—'}</div>
    <div>Unit: ${f.eselon4||f.eselon3||'—'}</div>
    <div>Langkah: ${f.langkah.length} prosedur</div>`;

  // Jika sudah ada NIP & nama dari context, sembunyikan row input
  const nipRow = document.getElementById('mKirimNIPRow');
  if (nipRow && nip && nama) nipRow.style.display = 'none';

  openModal('mKirim');
}

  const nip  = document.getElementById('mNIP').value.trim();
