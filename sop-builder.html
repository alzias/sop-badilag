  if (!nip)  { toast('⚠ NIP wajib diisi','err'); return; }
  if (!nama) { toast('⚠ Nama wajib diisi','err'); return; }

  const btn = document.getElementById('btnDoKirim');
  btn.textContent = '⏳ Mengirim...';
  btn.disabled = true;

  const f = state.form;
  const draftId = 'sop_'+Date.now();
  const draftData = {
    draftId, namaSOP:f.namaSOP, nomorSOP:f.nomorSOP,
    eselon3:f.eselon3, eselon4:f.eselon4,
    instansi:f.instansi, alamat:f.alamat,
    tglPembuatan:f.tglPembuatan, tglRevisi:f.tglRevisi, tglEfektif:f.tglEfektif,
    disahkanOleh:f.disahkanOleh, deskripsi:f.deskripsi||'',
    dasarHukum:f.dasarHukum, kualifikasiPelaksana:f.kualifikasiPelaksana,
    keterkaitan:f.keterkaitan, peralatan:f.peralatan,
    peringatan:f.peringatan, pencatatan:f.pencatatan,
    pelaksana:f.pelaksana, langkah:f.langkah,
    dibuatOleh:nip, namaPembuat:nama,
    deptId: state.ctx ? state.ctx.deptId : '',
    status:'pending_e3', catatanE3:'', catatanAdmin:'',
    reviewerE3Nip:'', reviewerE3Nama:'', tglReviewE3:'',
    adminNip:'', adminNama:'', tglReviewAdmin:'',
    approverE2Nip:'', approverE2Nama:'', tglSigned:'', urlPDFSigned:'',
    tglKirim:new Date().toISOString(),
    createdAt:new Date().toISOString(),
    updatedAt:new Date().toISOString()
  };

  // Simpan ke Firebase Firestore
  // Simpan ke Firestore sop_drafts dengan field draftId
  const savedFB = await fbSaveSOP(Object.assign({id:draftId, draftId}, draftData));

  // Kirim ke Worker juga (untuk email notifikasi)
  let workerOk = false;
  try {
    const res = await fetch(WORKER_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
          action          : 'submitDraft',
          sopData         : f,
          dibuatOleh      : nip,
          namaPembuat     : nama,
          deptId          : draftData.deptId,
          eselon4         : f.eselon4,
          reviewerE3Email : '',
          reviewerE3Nama  : ''
        })
    });
    const data = await res.json();
    workerOk = data.success;
  } catch(e) { console.warn('Worker submit error:', e); }

  btn.textContent = '📤 Kirim Sekarang';
  btn.disabled = false;

  if (savedFB || workerOk) {
    closeModal('mKirim');
    toast('✅ Draft berhasil dikirim! Admin akan mereview segera.');

    // Notify SOPI via postMessage (jika dibuka dari SOPI)
    if (window.opener) {
      try {
        window.opener.postMessage({
          type:'SOP_SUBMITTED',
          draftId, namaSOP:f.namaSOP, status:'pending_e3',
          namaPembuat:nama, nip
        }, '*');
      } catch(e) {}
    }

    // Tambah ke list lokal
    state.draftList.unshift(Object.assign({}, draftData));

    // Reset form
    state.form = JSON.parse(JSON.stringify(EMPTY_FORM));
    if (state.ctx) {
      if (state.ctx.e3) state.form.eselon3 = decodeURIComponent(state.ctx.e3);
      if (state.ctx.e4) state.form.eselon4 = decodeURIComponent(state.ctx.e4);
    }
    state.fileState = 'idle';

    setTimeout(() => setTab(2), 800);
  } else {
    toast('❌ Gagal menyimpan. Cek koneksi.','err');
  }
}

// ══ ADMIN ACTIONS ══
async function loadDrafts() {
  state.draftLoading = true;
  render();
  try {
    const list = await fbLoadSOPs();
    if (list.length) {
      const myNIP = state.ctx ? state.ctx.nip : '';
      const myNama = state.ctx ? decodeURIComponent(state.ctx.nama||'') : '';
      state.draftList = myNIP
        ? list.filter(d => d.dibuatOleh===myNIP || d.namaPembuat===myNama)
        : list;
    }
  } catch(e) { console.warn('loadDrafts error:', e); }
  state.draftLoading = false;
  render();
}

function toggleDraftSel(id) {
  state.selDraft = state.selDraft===id ? null : id;
  render();
}

// doApprove & doReject dihapus — approval dilakukan di SOPI oleh reviewer/admin/eselon2
// Builder hanya untuk Eselon IV (Maker): buat, edit, submit, tracking status

// ══ SOPI INTEGRATION — buka Builder dari SOPI ══
// Fungsi ini dipanggil dari SOPI: openSOPBuilder(user)
// Atau via URL: ?nip=xxx&nama=xxx&e3=xxx&e4=xxx
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'SOPI_CONTEXT') return;
  const d = e.data;
  state.ctx = { nip:d.nip||'', nama:d.nama||'', unit:d.unit||'', e3:d.e3||'', e4:d.e4||'', deptId:d.deptId||'' };
  if (state.ctx.e3) state.form.eselon3 = state.ctx.e3;
  if (state.ctx.e4) state.form.eselon4 = state.ctx.e4;
  document.getElementById('ctxName').textContent = d.nama||'';
  document.getElementById('ctxUnit').textContent  = d.e4||d.e3||d.unit||'';
  document.getElementById('ctxBar').style.display = 'flex';
  render();
});

// ══ INIT ══
window.addEventListener('load', function() {
  readURLContext();
  render();

  // Context bar close
  const ctxClose = document.querySelector('#ctxBar .ctx-close');
  if (ctxClose) ctxClose.addEventListener('click', () => {
    document.getElementById('ctxBar').style.display='none';
  });

  // Firebase badge
  if (db) {
    document.getElementById('badgeConn').textContent = '● Firebase';
    document.getElementById('badgeConn').style.color = 'var(--green)';
  }
});
</script>
