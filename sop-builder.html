// ══ DRAG & DROP MULTIFIELD ══
let _dragKey = null, _dragIdx = null, _dragEl = null;

function mfDragStart(e) {
  const row = e.currentTarget;
  _dragKey = row.dataset.mfkey;
  _dragIdx = +row.dataset.mfidx;
  _dragEl  = row;
  syncFormFromDOM();
  row.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _dragIdx);
}

function mfDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  if (row === _dragEl) return;
  const rect = row.getBoundingClientRect();
  document.querySelectorAll('.mf-row').forEach(r => r.classList.remove('drag-over-top','drag-over-bot'));
  row.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bot');
}

function mfDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-top','drag-over-bot');
}

function mfDrop(e, targetIdx) {
  e.preventDefault();
  document.querySelectorAll('.mf-row').forEach(r =>
    r.classList.remove('dragging','drag-over-top','drag-over-bot')
  );
  if (_dragKey === null || _dragIdx === null) return;
  const key      = _dragKey;
  const fromIdx  = _dragIdx;
  const rect     = e.currentTarget.getBoundingClientRect();
  const dropBefore = e.clientY < rect.top + rect.height / 2;
  let toIdx = dropBefore ? targetIdx : targetIdx + 1;
  if (toIdx > fromIdx) toIdx--;
  if (fromIdx === toIdx) return;
  const arr = [...(state.form[key] || [])];
  const [moved] = arr.splice(fromIdx, 1);
  arr.splice(toIdx, 0, moved);
  state.form[key] = arr;
  _dragKey = null; _dragIdx = null; _dragEl = null;
  render();
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === 'err' ? ' err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3000);
}

// ══ TAB ══
function setTab(i) {
  if (state.tab === 0) syncFormFromDOM();
  state.tab = i;
  const classes  = ['on','on amber','on green','on purple'];
  const defaults = ['','amber','green','purple'];
  [0,1,2,3].forEach(j => {
    const b = document.getElementById('tab'+j);
    if (!b) return;
    if (j===i) b.className = 'tab-btn ' + classes[j];
    else       b.className = 'tab-btn ' + defaults[j];
  });
  render();
  if (i===3) loadDrafts();
}

// ══ FORM HELPERS ══
function getFormVal(id) {
  const el = document.getElementById(id);
  // Return undefined kalau element tidak ada — biarkan state yang lama
  return el ? el.value : undefined;
}
function setFormVal(id, v) { const el=document.getElementById(id); if(el) el.value=v; }

function syncFormFromDOM() {
  // Sync identitas
  const fields = ['nomorSOP','namaSOP','eselon3','eselon4','instansi','alamat',
                  'tglPembuatan','tglRevisi','tglEfektif','disahkanOleh','deskripsi'];
  fields.forEach(k => { const v=getFormVal('f_'+k); if(v!==undefined) state.form[k]=v; });
  // Sync multifields
  const mfKeys = ['dasarHukum','kualifikasiPelaksana','keterkaitan','peralatan','peringatan','pencatatan','pelaksana'];
  mfKeys.forEach(k => {
    const els = document.querySelectorAll('.mf-item-'+k);
    if (els.length > 0) {  // only sync when elements exist in DOM
      const items = [];
      els.forEach(el => items.push(el.value));
      state.form[k] = items;
    }
  });
  // Sync langkah — hanya kalau elements ada di DOM
  const _stepBlocks = document.querySelectorAll('.step-block');
  if (_stepBlocks.length > 0) {
  const langkah=[];
  _stepBlocks.forEach((blk,i)=>{
    langkah.push({
      aktivitas: (blk.querySelector('.step-aktivitas')||{value:''}).value,
      // Multi-pelaksana: baca semua checkbox yang checked
      pelaksana: (()=>{
        const cbs = blk.querySelectorAll('.pel-cb:checked');
        const arr = Array.from(cbs).map(cb => +cb.dataset.idx);
        return arr.length ? arr : [0];
      })(),
      persyaratan: (blk.querySelector('.step-persyaratan')||{value:''}).value,
      waktu: (blk.querySelector('.step-waktu')||{value:''}).value,
      output: (blk.querySelector('.step-output')||{value:''}).value,
      keterangan: (blk.querySelector('.step-keterangan')||{value:''}).value
    });
  });
  if (langkah.length) state.form.langkah=langkah;
  } // end if _stepBlocks
}

    syncFormFromDOM(); // pastikan data form terbaru sebelum render flowchart
    cont.innerHTML = renderPreviewView('flow');

  else                    cont.innerHTML = renderAdminView();
  bindEvents();
}

function renderMultiField(key, label, items, ph) {

    </div>`;
  });
  h += `<button class="mf-add" onclick="addMF('${key}')">+ Tambah</button>`;
  return h;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══ FLOWCHART SYMBOL HELPER ══
// tipe: 'process' (default), 'decision' (belah ketupat), 'input' (parallelogram)
// Digunakan di renderFlowchart untuk menggambar shape sesuai tipe langkah
function getSymbol(tipe, text, cx, cy, col, boxW, boxH) {
  const hw = boxW / 2, hh = boxH / 2;
  let shape = '';
  let textEl = '';

  // Wrap teks menjadi maks 3 baris
  const words = (text || '').split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    if ((cur + ' ' + w).trim().length > 18) { lines.push(cur.trim()); cur = w; }
    else cur = (cur + ' ' + w).trim();
  });
  if (cur) lines.push(cur.trim());
  const tLines = lines.slice(0, 3);
  const lineH = 12;
  const tStartY = cy - (tLines.length * lineH) / 2 + 5;
  tLines.forEach((ln, li) => {
    textEl += `<text x="${cx + 4}" y="${tStartY + li * lineH}" text-anchor="middle"
      font-size="8" fill="${col.text}" font-family="sans-serif">${ln}</text>`;
  });

  switch (tipe) {
    case 'decision': {
      // Belah ketupat — lebar diperbesar agar muat teks
      const dw = Math.max(boxW * 0.6, 44), dh = Math.max(boxH * 0.55, 22);
      const pts = `${cx},${cy - dh} ${cx + dw},${cy} ${cx},${cy + dh} ${cx - dw},${cy}`;
      shape = `<polygon points="${pts}"
        fill="${col.fill}" stroke="${col.stroke}" stroke-width="1.5" filter="url(#fsh)"/>`;
      break;
    }
    case 'input': {
      // Parallelogram (dokumen input/output)
      const skew = 10;
      const pts = `${cx - hw + skew},${cy - hh} ${cx + hw + skew},${cy - hh}
                   ${cx + hw - skew},${cy + hh} ${cx - hw - skew},${cy + hh}`;
      shape = `<polygon points="${pts}"
        fill="${col.fill}" stroke="${col.stroke}" stroke-width="1.5" filter="url(#fsh)"/>`;
      break;
    }
    default: {
      // Proses — persegi panjang rounded (bawaan)
      shape = `<rect x="${cx - hw}" y="${cy - hh}" width="${boxW}" height="${boxH}"
        rx="6" fill="${col.fill}" stroke="${col.stroke}" stroke-width="1.5" filter="url(#fsh)"/>`;
    }
  }
  return shape + textEl;
}

function renderFlowchart(f) {
  const langkah  = f.langkah  || [];
  const pelaksana = f.pelaksana || [];
  if (!langkah.length || !pelaksana.length)
    return '<div style="text-align:center;padding:40px;color:var(--mu2);">Isi langkah dan pelaksana di form terlebih dahulu</div>';

  // ── Layout constants ──
  const COL_W  = 130, HDR_H = 44, PAD_X = 16, PAD_Y = 20;
  const BOX_W  = 108, BOX_H = 52;   // persegi panjang = proses
  const OVAL_H = 28, OVAL_W = 80;   // oval = mulai/selesai
  const ROW_H  = 90;                 // jarak antar baris

  const totalCols = pelaksana.length;
  const totalRows = langkah.length;
  const svgW = PAD_X*2 + totalCols * COL_W;
  const svgH = PAD_Y + HDR_H + 30 + OVAL_H + (totalRows * ROW_H) + ROW_H + 20;

  const colCX = pi => PAD_X + pi * COL_W + COL_W / 2;  // center-x per kolom
  const rowCY = i  => PAD_Y + HDR_H + 30 + OVAL_H + 10 + i * ROW_H + BOX_H / 2;

  // ── Warna per pelaksana ──
  const COLORS = [
    {fill:'#dbeafe',stroke:'#3b82f6',text:'#1e40af'},
    {fill:'#dcfce7',stroke:'#22c55e',text:'#166534'},
    {fill:'#fef9c3',stroke:'#eab308',text:'#713f12'},
    {fill:'#fce7f3',stroke:'#ec4899',text:'#9d174d'},
    {fill:'#ede9fe',stroke:'#8b5cf6',text:'#4c1d95'},
    {fill:'#ffedd5',stroke:'#f97316',text:'#7c2d12'},
    {fill:'#cffafe',stroke:'#06b6d4',text:'#164e63'},
    {fill:'#f0fdf4',stroke:'#4ade80',text:'#14532d'},
  ];

  // Fungsi wrap text
  function wrapText(str, maxChar) {
    str = (str || '').trim();
    if (str.length <= maxChar) return [str];
    const words = str.split(' ');
    const lines = [];
    let cur = '';
    words.forEach(w => {
      if ((cur + ' ' + w).trim().length > maxChar) { lines.push(cur.trim()); cur = w; }
      else cur = (cur + ' ' + w).trim();
    });
    if (cur) lines.push(cur.trim());
    return lines.slice(0, 3);
  }

  let svg = `<svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:${svgW}px;">`;
  svg += `<defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="fsh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000018"/>
    </filter>
  </defs>`;

  // ── Header kolom pelaksana ──
  pelaksana.forEach((p, pi) => {
    const cx = PAD_X + pi * COL_W;
    const col = COLORS[pi % COLORS.length];
    svg += `<rect x="${cx}" y="${PAD_Y}" width="${COL_W}" height="${HDR_H}"
      fill="${col.fill}" stroke="${col.stroke}" stroke-width="0.8"/>`;
    const pWords = (p || '').split(' ');
    const pL1 = pWords.slice(0, 2).join(' ').slice(0, 18);
    const pL2 = pWords.slice(2).join(' ').slice(0, 18);
    svg += `<text x="${cx + COL_W/2}" y="${PAD_Y + (pL2?14:20)}" text-anchor="middle"
      font-size="9" font-weight="700" fill="${col.text}" font-family="sans-serif">${pL1}</text>`;
    if (pL2) svg += `<text x="${cx + COL_W/2}" y="${PAD_Y + 26}" text-anchor="middle"
      font-size="9" fill="${col.text}" font-family="sans-serif">${pL2}</text>`;
    // Garis kolom vertikal (dashed)
    svg += `<line x1="${cx + COL_W/2}" y1="${PAD_Y + HDR_H}"
      x2="${cx + COL_W/2}" y2="${svgH - 20}" stroke="${col.stroke}" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.4"/>`;
  });

  // ── MULAI — oval ──
  const startCol  = langkah[0]
    ? (Array.isArray(langkah[0].pelaksana) ? langkah[0].pelaksana[0] : langkah[0].pelaksana) || 0
    : 0;
  const startCX   = colCX(startCol);
  const startCY   = PAD_Y + HDR_H + 18;
  svg += `<ellipse cx="${startCX}" cy="${startCY}" rx="${OVAL_W/2}" ry="${OVAL_H/2}"
    fill="#1e293b" filter="url(#fsh)"/>`;
  svg += `<text x="${startCX}" y="${startCY + 1}" text-anchor="middle" dominant-baseline="middle"
    font-size="10" font-weight="700" fill="#fff" font-family="sans-serif" letter-spacing="1">MULAI</text>`;

  // Panah dari MULAI ke langkah 1
  const firstCY = rowCY(0);
  svg += `<line x1="${startCX}" y1="${startCY + OVAL_H/2}"
    x2="${colCX(langkah[0]?langkah[0].pelaksana:0)}" y2="${firstCY - BOX_H/2 - 2}"
    stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>`;

  // ── Langkah-langkah — persegi panjang (rounded) ──
  langkah.forEach((l, i) => {
    // Support multi-pelaksana: pakai index pertama sebagai posisi kotak
    const pelArr = Array.isArray(l.pelaksana) ? l.pelaksana : [l.pelaksana || 0];
    const pi  = Math.min(pelArr[0] || 0, pelaksana.length - 1);
    const cx  = colCX(pi);
    const cy  = rowCY(i);
    const col = COLORS[pi % COLORS.length];
    const bx  = cx - BOX_W/2, by = cy - BOX_H/2;

    // Shape proses — gunakan getSymbol() sesuai tipe langkah
    // Tentukan tipe: 'decision' jika aktivitas mengandung kata keputusan/cek/verifikasi
    const isDecision = /\b(verifikasi|cek|periksa|sesuai|setuju|approved|decision|apakah|jika|bila)\b/i.test(l.aktivitas||'');
    const isInput    = /\b(input|upload|isi|mengisi|melengkapi|menyerahkan|lampirkan)\b/i.test(l.aktivitas||'');
    const symTipe    = isDecision ? 'decision' : isInput ? 'input' : 'process';
    svg += getSymbol(symTipe, l.aktivitas, cx, cy, col, BOX_W, BOX_H);

    // Nomor langkah (circle di sudut kiri atas)
    svg += `<circle cx="${bx + 12}" cy="${by + 12}" r="9" fill="${col.stroke}"/>`;

    // Multi-pelaksana: kotak penuh "koordinasi" di setiap kolom yang terlibat
    if (pelArr.length > 1) {
      pelArr.slice(1).forEach(extraPi => {
        const epi  = Math.min(extraPi, pelaksana.length - 1);
        const ecol = COLORS[epi % COLORS.length];
        const ecx  = colCX(epi);
        const ebx  = ecx - BOX_W/2;
        // Kotak koordinasi penuh (dashed border)
        svg += `<rect x="${ebx}" y="${by}" width="${BOX_W}" height="${BOX_H}"
          rx="6" fill="${ecol.fill}" stroke="${ecol.stroke}" stroke-width="1.5"
          stroke-dasharray="5,3" filter="url(#fsh)"/>`;
        svg += `<text x="${ecx}" y="${cy - 4}" text-anchor="middle"
          font-size="7" fill="${ecol.text}" font-style="italic" font-family="sans-serif">koordinasi</text>`;
        // Garis penghubung horizontal dari kotak utama ke kotak koordinasi
        const lx1 = pi < epi ? cx + BOX_W/2 : cx - BOX_W/2;
        const lx2 = pi < epi ? ecx - BOX_W/2 : ecx + BOX_W/2;
        svg += `<line x1="${lx1}" y1="${cy}" x2="${lx2}" y2="${cy}"
          stroke="${ecol.stroke}" stroke-width="1.5" stroke-dasharray="6,3"
          marker-end="url(#arr)"/>`;
      });
    }
    svg += `<text x="${bx + 12}" y="${by + 12}" text-anchor="middle" dominant-baseline="middle"
      font-size="8" font-weight="700" fill="#fff" font-family="sans-serif">${i+1}</text>`;

    // Waktu (kecil di bawah kotak)
    if (l.waktu) {
      svg += `<text x="${cx}" y="${by + BOX_H - 5}" text-anchor="middle"
        font-size="7" fill="#94a3b8" font-family="sans-serif">⏱ ${l.waktu}</text>`;
    }

    // ── Panah ke langkah berikutnya ──
    if (i < langkah.length - 1) {
      const nextPelArr = Array.isArray(langkah[i+1].pelaksana) ? langkah[i+1].pelaksana : [langkah[i+1].pelaksana || 0];
      const nextPi = Math.min(nextPelArr[0] || 0, pelaksana.length - 1);
      const nextCX = colCX(nextPi);
      const nextCY = rowCY(i + 1);
      const fromX  = cx, fromY = cy + BOX_H/2;
      const toX    = nextCX, toY = nextCY - BOX_H/2 - 2;

      if (Math.abs(fromX - toX) < 8) {
        // Langsung lurus
        svg += `<line x1="${fromX}" y1="${fromY}" x2="${toX}" y2="${toY}"
          stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>`;
      } else {
        // Elbow — turun setengah lalu geser ke kolom berikutnya
        const midY = fromY + (toY - fromY) * 0.45;
        svg += `<path d="M ${fromX} ${fromY} L ${fromX} ${midY} L ${toX} ${midY} L ${toX} ${toY}"
          fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>`;
      }
    }
  });

  // ── SELESAI — pentagon/home shape ──
  const lastL    = langkah[langkah.length - 1];
  const lastPelArr = Array.isArray(lastL.pelaksana) ? lastL.pelaksana : [lastL.pelaksana || 0];
  const lastPi   = Math.min(lastPelArr[0] || 0, pelaksana.length - 1);
  const endCX    = colCX(lastPi);
  const endCY    = rowCY(langkah.length - 1) + BOX_H/2 + ROW_H * 0.65;
  const endW = 80, endH = 28;
  const ex = endCX, ey = endCY;
  // Arrow to end
  svg += `<line x1="${colCX(lastPi)}" y1="${rowCY(langkah.length-1)+BOX_H/2}"
    x2="${ex}" y2="${ey - endH/2 - 2}" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>`;
  // Pentagon (end shape)
  const pts = [
    [ex - endW/2, ey - endH/2],
    [ex + endW/2, ey - endH/2],
    [ex + endW/2, ey + endH/2 - 6],
    [ex,          ey + endH/2 + 4],
    [ex - endW/2, ey + endH/2 - 6],
  ].map(p => p.join(',')).join(' ');
  svg += `<polygon points="${pts}" fill="#1e293b" filter="url(#fsh)"/>`;
  svg += `<text x="${ex}" y="${ey + 1}" text-anchor="middle" dominant-baseline="middle"
    font-size="10" font-weight="700" fill="#fff" font-family="sans-serif" letter-spacing="1">SELESAI</text>`;

  svg += '</svg>';
  return `<div class="card"><div class="card-title amber">🔀 FLOWCHART PROSES — ${f.namaSOP||'SOP'}</div>
    <div id="flowWrap" style="overflow-x:auto;background:#f8fafc;border-radius:10px;padding:12px;">
      <div style="font-size:10px;color:#94a3b8;margin-bottom:8px;">
        ⬭ Oval = Mulai/Selesai &nbsp;|&nbsp; ▭ Persegi = Aktivitas/Proses &nbsp;|&nbsp; Warna = Pelaksana berbeda
      </div>
      ${svg}
    </div></div>`;
}

// ══ renderFlowchartSVG — return SVG string untuk embed di preview dokumen ══
// Sama dengan renderFlowchart tapi return SVG string bukan HTML wrapper
function renderFlowchartSVG(f) {
  const pelaksana = (f.pelaksana||[]).filter(p=>p);
  if (!pelaksana.length || !f.langkah||!f.langkah.length) return '<p style="font-size:10px;color:#999;">Belum ada data flowchart</p>';
  const langkah = f.langkah.filter(l=>l.aktivitas);
  if (!langkah.length) return '<p style="font-size:10px;color:#999;">Belum ada langkah prosedur</p>';

  // Dimensi — lebih kecil untuk embed di preview
  const nPel    = pelaksana.length;
  const COL_W   = 130, BOX_W = 100, BOX_H = 54;
  const ROW_H   = 90,  PAD_X = 20,  PAD_Y = 30;
  const totalW  = PAD_X*2 + nPel*COL_W;
  const totalH  = PAD_Y + 50 + langkah.length * ROW_H + 80;

  const colCX = pi => PAD_X + pi*COL_W + COL_W/2;
  const rowCY = i  => PAD_Y + 50 + i*ROW_H + BOX_H/2;

  const COLORS = [
    {fill:'#dbeafe',stroke:'#2563eb',text:'#1e3a8a'},
    {fill:'#dcfce7',stroke:'#16a34a',text:'#14532d'},
    {fill:'#fef9c3',stroke:'#ca8a04',text:'#713f12'},
    {fill:'#fce7f3',stroke:'#db2777',text:'#831843'},
    {fill:'#ede9fe',stroke:'#7c3aed',text:'#4c1d95'},
    {fill:'#ffedd5',stroke:'#ea580c',text:'#7c2d12'},
  ];

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" style="font-family:Arial,sans-serif;display:block;">`;

  // Defs: marker panah
  svg += `<defs>
    <marker id="svgarrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <filter id="svgfsh" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
  </defs>`;

  // Background kolom
  pelaksana.forEach((p,pi) => {
    const col = COLORS[pi % COLORS.length];
    const cx = PAD_X + pi*COL_W;
    svg += `<rect x="${cx}" y="${PAD_Y}" width="${COL_W}" height="${totalH-PAD_Y-10}" fill="${col.fill}" opacity="0.25"/>`;
    svg += `<rect x="${cx}" y="${PAD_Y}" width="${COL_W}" height="32" fill="${col.fill}" stroke="${col.stroke}" stroke-width="0.5"/>`;
    svg += `<text x="${cx+COL_W/2}" y="${PAD_Y+12}" text-anchor="middle" font-size="9" font-weight="700" fill="${col.text}">${p.split(' ').slice(0,2).join(' ')}</text>`;
    svg += `<text x="${cx+COL_W/2}" y="${PAD_Y+24}" text-anchor="middle" font-size="8" fill="${col.text}">${p.split(' ').slice(2).join(' ')}</text>`;
    // Garis vertikal dashed
    svg += `<line x1="${cx+COL_W/2}" y1="${PAD_Y+32}" x2="${cx+COL_W/2}" y2="${totalH-30}" stroke="${col.stroke}" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.4"/>`;
  });

  // MULAI
  const startPelArr = Array.isArray(langkah[0].pelaksana)?langkah[0].pelaksana:[langkah[0].pelaksana||0];
  const startCX = colCX(Math.min(startPelArr[0]||0, nPel-1));
  svg += `<ellipse cx="${startCX}" cy="${PAD_Y+42}" rx="28" ry="12" fill="#1a1a2e"/>`;
  svg += `<text x="${startCX}" y="${PAD_Y+47}" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">MULAI</text>`;
  svg += `<line x1="${startCX}" y1="${PAD_Y+54}" x2="${startCX}" y2="${PAD_Y+50+BOX_H/2-2}" stroke="#555" stroke-width="1.2" marker-end="url(#svgarrow)"/>`;

  langkah.forEach((l,i) => {
    const pelArr = Array.isArray(l.pelaksana)?l.pelaksana:[l.pelaksana||0];
    const cy = rowCY(i);
    const by = cy - BOX_H/2;

    // Kotak utama (pelaksana[0])
    const pi0 = Math.min(pelArr[0]||0, nPel-1);
    const col0 = COLORS[pi0 % COLORS.length];
    const cx0 = colCX(pi0);
    const bx0 = cx0 - BOX_W/2;

    svg += `<rect x="${bx0}" y="${by}" width="${BOX_W}" height="${BOX_H}" rx="6" fill="${col0.fill}" stroke="${col0.stroke}" stroke-width="1.5" filter="url(#svgfsh)"/>`;
    // Nomor
    svg += `<circle cx="${bx0+12}" cy="${by+12}" r="8" fill="${col0.stroke}"/>`;
    svg += `<text x="${bx0+12}" y="${by+16}" text-anchor="middle" font-size="7" fill="#fff" font-weight="800">${i+1}</text>`;
    // Teks aktivitas (wrap 3 baris)
    const words = (l.aktivitas||'').split(' ');
    const lines = []; let cur='';
    words.forEach(w=>{ if((cur+' '+w).trim().length>18){lines.push(cur.trim());cur=w;}else cur=(cur+' '+w).trim(); });
    if(cur)lines.push(cur.trim());
    const tLines = lines.slice(0,3);
    const tStartY = cy - (tLines.length*11)/2 + 5;
    tLines.forEach((ln,li) => {
      svg += `<text x="${cx0+4}" y="${tStartY+li*11}" text-anchor="middle" font-size="7.5" fill="${col0.text}">${ln}</text>`;
    });
    // Waktu
    if(l.waktu) svg += `<text x="${cx0}" y="${by+BOX_H-4}" text-anchor="middle" font-size="6.5" fill="#94a3b8">⏱ ${l.waktu}</text>`;

    // Kotak penuh koordinasi untuk pelaksana tambahan (multi-pelaksana)
    pelArr.slice(1).forEach(extraPi => {
      const epi = Math.min(extraPi, nPel-1);
      if(epi === pi0) return;
      const col = COLORS[epi % COLORS.length];
      const ecx = colCX(epi);
      const ebx = ecx - BOX_W/2;
      // Kotak koordinasi penuh dengan border dashed
      svg += `<rect x="${ebx}" y="${by}" width="${BOX_W}" height="${BOX_H}"
        rx="6" fill="${col.fill}" stroke="${col.stroke}" stroke-width="1.5"
        stroke-dasharray="5,3" filter="url(#svgfsh)"/>`;
      svg += `<text x="${ecx}" y="${cy - 3}" text-anchor="middle"
        font-size="7" fill="${col.text}" font-style="italic">koordinasi</text>`;
      // Garis penghubung horizontal dengan panah
      const lx1 = pi0 < epi ? cx0+BOX_W/2 : cx0-BOX_W/2;
      const lx2 = pi0 < epi ? ecx-BOX_W/2 : ecx+BOX_W/2;
      svg += `<line x1="${lx1}" y1="${cy}" x2="${lx2}" y2="${cy}"
        stroke="${col.stroke}" stroke-width="1.5" stroke-dasharray="6,3"
        marker-end="url(#svgarrow)"/>`;
    });

    // Panah ke langkah berikutnya
    if(i < langkah.length-1) {
      const nextPelArr = Array.isArray(langkah[i+1].pelaksana)?langkah[i+1].pelaksana:[langkah[i+1].pelaksana||0];
      const nextPi = Math.min(nextPelArr[0]||0, nPel-1);
      const ncx = colCX(nextPi);
      const sy = by+BOX_H; const ey = rowCY(i+1)-BOX_H/2;
      if(Math.abs(cx0-ncx)<5) {
        svg += `<line x1="${cx0}" y1="${sy}" x2="${ncx}" y2="${ey-2}" stroke="#555" stroke-width="1.2" marker-end="url(#svgarrow)"/>`;
      } else {
        const midY = sy+(ey-sy)/2;
        svg += `<path d="M ${cx0} ${sy} L ${cx0} ${midY} L ${ncx} ${midY} L ${ncx} ${ey-2}" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#svgarrow)"/>`;
      }
    }
  });

  // SELESAI
  const lastL = langkah[langkah.length-1];
  const lastPelArr = Array.isArray(lastL.pelaksana)?lastL.pelaksana:[lastL.pelaksana||0];
  const lastCX = colCX(Math.min(lastPelArr[0]||0, nPel-1));
  const ey = rowCY(langkah.length-1)+BOX_H/2;
  svg += `<line x1="${lastCX}" y1="${ey}" x2="${lastCX}" y2="${ey+20}" stroke="#555" stroke-width="1.2" marker-end="url(#svgarrow)"/>`;
  const py = ey+22;
  svg += `<polygon points="${lastCX-32},${py} ${lastCX+32},${py} ${lastCX+32},${py+14} ${lastCX},${py+28} ${lastCX-32},${py+14}" fill="#1a1a2e"/>`;
  svg += `<text x="${lastCX}" y="${py+13}" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">SELESAI</text>`;
  svg += '</svg>';
  return svg;
}

// ── Helper: dapatkan e2TargetId dari state (saat preview setelah disetujui) ──
function getE2TargetFromState() {
  // Prioritas 1: dari draft aktif (SOP sudah disahkan via workflow)
  if (state._editingDraftId) {
    var draft = state.draftList.find(function(d){ return (d.draftId||d.id) === state._editingDraftId; });
    if (draft && draft.e2TargetId) return draft.e2TargetId;
    if (draft && draft.approverE2Nip) {
      if (draft.approverE2Nip === '196809041993031004') return 'e2_sek';
      if (draft.approverE2Nip === '197302171992031001') return 'e2_adm';
    }
    if (draft && draft.e2TargetId) return draft.e2TargetId;
  }
  // Prioritas 2: dari form (Builder standalone — unit eselon3 / disahkanOleh)
  var f = state.form;
  if (f) {
    var sah = (f.disahkanOleh||'').toLowerCase();
    var e3  = (f.eselon3||'').toLowerCase();
    // Sekretariat → TTE Sekretaris Dirjen
    if (sah.indexOf('sekretari') >= 0 || e3.indexOf('sekretari') >= 0) return 'e2_sek';
    // Direktorat Pembinaan Administrasi → TTE Direktur
    if (sah.indexOf('direktur') >= 0 || e3.indexOf('direktur') >= 0 || e3.indexOf('administrasi') >= 0) return 'e2_adm';
    // Default: jika ada nama SOP / unit → tampilkan Sekretaris sebagai default
    if (f.namaSOP || f.nomorSOP) return 'e2_sek';
  }
  return null;
}

function secTable(title, items) {
  // Filter: buang item yang isinya hanya label section (sisa artefak parser)
  const SECTION_LABELS = /^(peralatan\s*[/\\]?\s*perlengkapan|peralatan|keterkaitan|peringatan|pencatatan dan pendataan|pencatatan|dasar hukum|kualifikasi pelaksana|pelaksana|mutu baku)\s*[:/]?\s*$/i;
  const clean = (items||[]).filter(x => x && !SECTION_LABELS.test(x.trim()));
  if (!clean.length) return '';
  return `<table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:4px;">
    <tr><th style="border:1px solid #000;background:#f0f0f0;padding:4px 6px;text-align:left;" colspan="2">${title}</th></tr>
    ${clean.map((it,i)=>`<tr><td style="border:1px solid #000;padding:3px 6px;width:20px;">${i+1}.</td><td style="border:1px solid #000;padding:3px 6px;">${it}</td></tr>`).join('')}
  </table>`;
}

// ── Proses ajukan revisi SOP ──
async function doRevisiSOP() {
  const draftId = state._revisiDraftId;
  if (!draftId) return;
  const alasanEl = document.getElementById('mRevisiAlasan');
  const alasan   = alasanEl ? alasanEl.value.trim() : '';
  if (!alasan) { toast('⚠ Alasan revisi wajib diisi', 'err'); alasanEl && alasanEl.focus(); return; }

  const d = state.draftList.find(x => (x.draftId||x.id) === draftId);
  if (!d) { toast('Data SOP tidak ditemukan', 'err'); return; }

  const btnYa = document.querySelector('#mRevisi button[onclick="doRevisiSOP()"]');
  if (btnYa) { btnYa.textContent = '⏳ Mengirim...'; btnYa.disabled = true; }

  // Update status di Firestore → revision_request
  d.status = 'revision_request';
  d.catatanRevisi = alasan;
  d.tglRevisiRequest = new Date().toISOString();
  await fbSaveSOP(d).catch(function(){});

  // Kirim email ke Admin SOP via Worker /send-email
  try {
    await fetch(WORKER_URL + '/send-email', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({
        action  : 'sendEmail',
        toEmail : state.ctx && state.ctx.adminEmail ? state.ctx.adminEmail : '',
        subject : '🔄 Permintaan Revisi SOP: ' + (d.namaSOP||''),
        userName: 'Admin SOP',
        tanggal : new Date().toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'}),
        topics  : [
          'Permintaan revisi dari: ' + (state.ctx ? decodeURIComponent(state.ctx.nama||'') : d.namaPembuat||'Pembuat'),
          'SOP: ' + (d.namaSOP||''),
          'Unit: ' + (d.eselon4||d.eselon3||''),
          'Alasan: ' + alasan
        ],
        sopList : [{ title: d.namaSOP||'', unit: d.eselon4||'', linkFinal: d.urlPDFSigned||'' }]
      })
    });
  } catch(e) { console.warn('Email revisi error:', e); }

  if (btnYa) { btnYa.textContent = 'Ya, Ajukan Revisi'; btnYa.disabled = false; }
  closeModal('mRevisi');

  // Update local state
  const idx = state.draftList.findIndex(x => (x.draftId||x.id) === draftId);
  if (idx >= 0) state.draftList[idx] = d;

  toast('✅ Permintaan revisi berhasil dikirim ke Admin SOP');
  render();
}

// ══ BIND EVENTS ══
function bindEvents() {
  // File input
  const fi = document.getElementById('fileInput');
  if (fi) fi.addEventListener('change', function(e) {
    const file = e.target.files && e.target.files[0];
    if (file) processFile(file);
    e.target.value = '';
  });

  // Drop zone
  const dz = document.getElementById('dropZone');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => {
      e.preventDefault(); dz.classList.remove('drag-over');
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) processFile(file);
    });
  }

  // Auto-save on field change
  document.querySelectorAll('.f-field').forEach(el => {
    el.addEventListener('change', () => syncFormFromDOM());
  });
}

// ══ FILE PROCESSING ══
function processFile(file) {
  // Validasi: cek extension DAN MIME type (untuk file dari WhatsApp/mobile yang nama berubah)
  const validExt  = file.name.match(/\.(docx|doc)$/i);
  const validMime = file.type && (
    file.type.includes('word') ||
    file.type.includes('document') ||
    file.type.includes('officedocument') ||
    file.type.includes('msword') ||
    file.type === 'application/octet-stream' // beberapa mobile kirim generic
  );
  if (!validExt && !validMime) {
    state.fileState='error';
    state.parseInfo='Format tidak didukung. Gunakan file .docx atau .doc (MIME: '+file.type+', nama: '+file.name+')';
    render(); return;
  }
  state.fileName = file.name;
  state.fileState = 'parsing';
  render();
  file.arrayBuffer().then(ab => {
    if (!window.mammoth) throw new Error('Library mammoth belum dimuat, coba lagi');
    // Ekstrak dua format sekaligus: HTML (untuk tabel) + teks mentah (untuk metadata)
    return Promise.all([
      window.mammoth.convertToHtml({ arrayBuffer: ab }),
      window.mammoth.extractRawText({ arrayBuffer: ab })
    ]);
  }).then(([htmlResult, textResult]) => {
    const raw  = textResult.value || '';
    const html = htmlResult.value || '';
    if (raw.length < 50) throw new Error('File kosong atau tidak bisa dibaca');

    // Tahap 1: parse metadata & struktur dari teks biasa
    const parsed = parseSOPFromText(raw);

    // Tahap 2a: overwrite section dari <p>/<li> HTML (format multi-tabel)
    const ktItems = parseSectionFromHTML(html, 'KETERKAITAN');
    if (ktItems.length > 0) parsed.keterkaitan = ktItems.concat(['']);
    // Peringatan — parse dulu, lalu validasi: kontennya tidak boleh sama dengan Pencatatan
    const prItems = parseSectionFromHTML(html, 'PERINGATAN');
    const pcItems = parseSectionFromHTML(html, 'PENCATATAN DAN PENDATAAN') ||
                    parseSectionFromHTML(html, 'PENCATATAN');
    // Jika Peringatan dan Pencatatan isinya sama → berarti boundary salah, jangan pakai
    const prValid = prItems.length > 0 &&
      JSON.stringify(prItems.slice(0,2)) !== JSON.stringify((pcItems||[]).slice(0,2));
    if (prValid) parsed.peringatan = prItems.concat(['']);
    if (pcItems && pcItems.length > 0) parsed.pencatatan = pcItems.concat(['']);

    // Tahap 2b: fallback — baca section dari <td> tabel (format single-tabel seperti SOP Cuti)
    // Dipakai kalau section masih kosong setelah parser teks dan parser HTML
    const tblSections = parseSectionFromTable(html);
    const SECTION_KEYS = ['dasarHukum','kualifikasiPelaksana','keterkaitan','peralatan','peringatan','pencatatan'];
    SECTION_KEYS.forEach(key => {
      const isEmpty = !parsed[key] || parsed[key].filter(x=>x).length === 0;
      if (isEmpty && tblSections[key] && tblSections[key].length > 0) {
        parsed[key] = tblSections[key];
      }
    });

    // Tahap 3: baca tabel prosedur dengan parseSOPPro (via parseTabelAktivitas)
    const langkahDariTabel = parseTabelAktivitas(html);

    state.form = parsed;

    // Gunakan populateForm untuk set langkah — sesuai saran Gemini
    // populateForm juga normalisasi field dan trigger render
    if (langkahDariTabel.length > 0) {
      // Set dulu ke state sebelum populateForm (supaya render pakai data terbaru)
      state.form.langkah = langkahDariTabel;
    }
    // Debug trace (console.log agar kompatibel semua browser termasuk mobile)
    const _dbg = console.log.bind(console);
    _dbg('[SOP Parser] keterkaitan:', parsed.keterkaitan);
    _dbg('[SOP Parser] peringatan:', parsed.peringatan);
    _dbg('[SOP Parser] langkah count:', parsed.langkah.filter(l=>l.aktivitas).length);
    _dbg('[SOP Parser] langkah sample:', parsed.langkah.slice(0,2));
    const lc = parsed.langkah.filter(l=>l.aktivitas).length;
    const pc = parsed.pelaksana.filter(p=>p).length;
    const src = langkahDariTabel.length > 0 ? ' (dari tabel Word)' : ' (dari teks biasa)';
    const ketWarn = langkahDariTabel.length > 0 && langkahDariTabel.some(l=>l.keterangan)
      ? ' ✓ kolom Ket terbaca' : '';
    state.parseInfo = lc+' langkah '+src+', '+pc+' pelaksana terdeteksi'+ketWarn;
    if (lc === 0) {
      state.parseInfo += ' — ⚠️ Tabel prosedur belum berisi langkah SOP. Isi langkah secara manual di bawah, atau pastikan dokumen Word sudah memiliki baris prosedur yang terisi.';
    }
    state.fileState = 'done';
    render();
  }).catch(e => {
    state.fileState='error'; state.parseInfo='Gagal: '+e.message;
    render();
  });
}

// ══ SUBMIT FLOW ══
function handleKirim() {
  syncFormFromDOM();
  const f = state.form;
  if (!f.namaSOP.trim()) { toast('⚠ Nama SOP wajib diisi','err'); return; }
  const filledLangkah = f.langkah.filter(l=>l.aktivitas.trim());
  if (!filledLangkah.length) { toast('⚠ Minimal 1 langkah prosedur wajib diisi','err'); return; }
  // Validasi kolom kosong (saran Gemini): highlight + scroll ke baris bermasalah
  const emptyWaktu = f.langkah.findIndex(l => l.aktivitas.trim() && !l.waktu.trim());
  if (emptyWaktu >= 0 && !state._forceSubmit) {
    toast('⚠ Langkah '+(emptyWaktu+1)+' belum ada Waktu (ditandai kuning). Klik Kirim lagi untuk tetap lanjutkan.','err');
    state._forceSubmit = true;
    setTimeout(() => {
      const el = document.querySelector('[data-idx="'+emptyWaktu+'"]');
      if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }, 200);
    return;
  }
  state._forceSubmit = false;

  // Pre-fill modal dari context
  const nip  = state.ctx ? state.ctx.nip  : '';
  const nama = state.ctx ? decodeURIComponent(state.ctx.nama||'') : '';
  const mNIP  = document.getElementById('mNIP');
  const mNama = document.getElementById('mNama');
  if (mNIP  && !mNIP.value  && nip)  mNIP.value  = nip;
  if (mNama && !mNama.value && nama) mNama.value = nama;

  // Isi info summary di modal
  const info = document.getElementById('mKirimInfo');
  if (info) info.innerHTML = `
    <div style="color:var(--tx);font-weight:700;margin-bottom:4px;">${f.namaSOP}</div>
    <div>Nomor: ${f.nomorSOP||'—'}</div>
    <div>Unit: ${f.eselon4||f.eselon3||'—'}</div>
    <div>Langkah: ${f.langkah.length} prosedur</div>`;

  // Jika sudah ada NIP & nama dari context, sembunyikan row input
  const nipRow = document.getElementById('mKirimNIPRow');
  if (nipRow && nip && nama) nipRow.style.display = 'none';

  openModal('mKirim');
}

    reviewerE3Nip:'', reviewerE3Nama:'', reviewerE3Email:'',
    tglReviewE3:'', adminNip:'', adminNama:'', tglReviewAdmin:'',
    approverE2Nip:'', approverE2Nama:'', tglSigned:'', urlPDFSigned:'',
    tglKirim:now, createdAt:now, updatedAt:now,
    sumber:'builder'
  };

  // ── SATU-SATUNYA yang tulis Firestore ──
  const savedFB = await fbSaveSOP(draftData);

  btn.textContent = '📤 Kirim Sekarang';
  btn.disabled = false;

  if (!savedFB) {
    toast('❌ Gagal menyimpan ke Firestore. Cek koneksi.','err');
    return;
  }

  closeModal('mKirim');
  toast('✅ Draft tersimpan! Mengirim notifikasi...');

  // ── Beritahu SOPI via postMessage (iframe atau popup) ──
  const msgData = {
    type:'SOP_SUBMITTED', draftId,
    namaSOP:f.namaSOP, status:'pending_e3',
    namaPembuat:nama, nip,
    deptId:draftData.deptId, eselon4:f.eselon4
  };
  // Coba parent (iframe mode) dulu, lalu opener (popup mode)
  try { window.parent && window.parent !== window && window.parent.postMessage(msgData, '*'); } catch(e){}
  try { window.opener && window.opener.postMessage(msgData, '*'); } catch(e){}

  // ── Jika standalone (tidak ada parent/opener) — fetch reviewer sendiri ──
  if (!window.opener && (window.parent === window)) {
    fbFetchReviewerE3(draftData.deptId).then(function(reviewer) {
      if (!reviewer) { toast('⚠ Reviewer E3 belum dikonfigurasi untuk unit ini.','err'); return; }
      var updated = Object.assign({}, draftData, {
        reviewerE3Nama: reviewer.name||'', reviewerE3Email: reviewer.email||'', reviewerE3Id: reviewer.id||''
      });
      fbSaveSOP(updated);
      if (reviewer.email) {
        fetch(WORKER_URL + '/send-email', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            action:'sendEmail', toEmail:reviewer.email,
            subject:'\uD83D\uDD0D Review SOP: '+f.namaSOP,
            userName:reviewer.name||'Bapak/Ibu',
            tanggal:new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}),
            topics:['SOP baru dari '+nama+' menunggu review Anda'],
            sopList:[{title:f.namaSOP, unit:f.eselon4||f.eselon3||'', linkFinal:''}]
          })
        }).catch(function(){});
        toast('📧 Email notifikasi dikirim ke '+reviewer.name);
      }
    });
  }

  // Tambah ke list lokal
  state.draftList.unshift(Object.assign({}, draftData));

  // Reset form
  state.form = JSON.parse(JSON.stringify(EMPTY_FORM));
  if (state.ctx) {
    if (state.ctx.e3) state.form.eselon3 = decodeURIComponent(state.ctx.e3);
    if (state.ctx.e4) state.form.eselon4 = decodeURIComponent(state.ctx.e4);
  }
  state.fileState = 'idle';
  setTimeout(() => setTab(3), 800);
}

// ══ ADMIN ACTIONS ══
async function loadDrafts() {
  state.draftLoading = true;
  render();
  try {
    const list = await fbLoadSOPs();
    if (list.length) {
      const myNIP = state.ctx ? state.ctx.nip : '';
      const myNama = state.ctx ? decodeURIComponent(state.ctx.nama||'') : '';
      state.draftList = myNIP
        ? list.filter(d => d.dibuatOleh===myNIP || d.namaPembuat===myNama)
        : list;
    }
  } catch(e) { console.warn('loadDrafts error:', e); }
  state.draftLoading = false;
  render();
}

function toggleDraftSel(id) {
  state.selDraft = state.selDraft===id ? null : id;
  render();
}

// doApprove & doReject dihapus — approval dilakukan di SOPI oleh reviewer/admin/eselon2
// Builder hanya untuk Eselon IV (Maker): buat, edit, submit, tracking status

// ══ SOPI INTEGRATION — buka Builder dari SOPI ══
// Fungsi ini dipanggil dari SOPI: openSOPBuilder(user)
// Atau via URL: ?nip=xxx&nama=xxx&e3=xxx&e4=xxx
window.addEventListener('message', function(e) {
  if (!e.data) return;
  // Ping dari SOPI — balas dengan BUILDER_READY
  if (e.data.type === 'SOPI_PING') {
    try { window.parent.postMessage({type:'BUILDER_READY'}, '*'); } catch(err){}
    try { window.opener && window.opener.postMessage({type:'BUILDER_READY'}, '*'); } catch(err){}
    return;
  }
  // Load data SOP ke form (mode preview dari reviewer)
  if (e.data.type === 'LOAD_SOP_DATA' && e.data.sopData) {
    const sop = e.data.sopData;
    const mapped = {
      nomorSOP    : sop.nomorSOP    || sop.nomorDokumen || '',
      namaSOP     : sop.namaSOP     || sop.judul        || '',
      eselon3     : sop.eselon3     || '',
      eselon4     : sop.eselon4     || sop.unitEselon4  || '',
      instansi    : sop.instansi    || '',
      alamat      : sop.alamat      || '',
      tglPembuatan: sop.tglPembuatan|| '',
      tglRevisi   : sop.tglRevisi   || '',
      tglEfektif  : sop.tglEfektif  || '',
      disahkanOleh: sop.disahkanOleh|| '',
      deskripsi   : sop.deskripsi   || '',
      dasarHukum  : Array.isArray(sop.dasarHukum) ? sop.dasarHukum : [sop.dasarHukum||''],
      kualifikasiPelaksana: Array.isArray(sop.kualifikasiPelaksana) ? sop.kualifikasiPelaksana : [sop.kualifikasiPelaksana||sop.kualifikasi||''],
      keterkaitan : Array.isArray(sop.keterkaitan)  ? sop.keterkaitan  : [sop.keterkaitan||''],
      peralatan   : Array.isArray(sop.peralatan)    ? sop.peralatan    : [sop.peralatan||''],
      peringatan  : Array.isArray(sop.peringatan)   ? sop.peringatan   : [sop.peringatan||''],
      pencatatan  : Array.isArray(sop.pencatatan)   ? sop.pencatatan   : [sop.pencatatan||''],
      pelaksana   : Array.isArray(sop.pelaksana)    ? sop.pelaksana    : [],
      langkah     : Array.isArray(sop.langkah)      ? sop.langkah      : [],
    };
    state.form = Object.assign({}, state.form, mapped);

    // ── autoExport: langsung export tanpa interaksi user ──
    if (e.data.autoExport === 'word') {
      // Render dulu ke tab preview agar state siap, lalu export
      setTab(1);
      setTimeout(function() {
        exportToWord();
        // Beritahu parent bahwa export selesai
        setTimeout(function() {
          try { window.parent.postMessage({type:'EXPORT_DONE', format:'word'}, '*'); } catch(err){}
        }, 3000);
      }, 800);
      return;
    }
    if (e.data.autoExport === 'pdf') {
      setTab(1);
      setTimeout(function() {
        exportDocPDF();
        setTimeout(function() {
          try { window.parent.postMessage({type:'EXPORT_DONE', format:'pdf'}, '*'); } catch(err){}
        }, 5000);
      }, 1000);
      return;
    }

    // Mode normal: buka tab Preview
    setTab(1);
    toast('📄 Dokumen SOP dimuat — lihat Preview dan Flowchart');
    return;
  }
  if (e.data.type !== 'SOPI_CONTEXT') return;
  const d = e.data;
  state.ctx = { nip:d.nip||'', nama:d.nama||'', unit:d.unit||'', e3:d.e3||'', e4:d.e4||'', deptId:d.deptId||'' };
  if (state.ctx.e3) state.form.eselon3 = state.ctx.e3;
  if (state.ctx.e4) state.form.eselon4 = state.ctx.e4;
  document.getElementById('ctxName').textContent = d.nama||'';
  document.getElementById('ctxUnit').textContent  = d.e4||d.e3||d.unit||'';
  document.getElementById('ctxBar').style.display = 'flex';
  render();
});

// ══ INIT ══
window.addEventListener('load', function() {
  readURLContext();
  render();

  // Beritahu parent/opener bahwa Builder sudah siap
  try { window.parent.postMessage({type:'BUILDER_READY'}, '*'); } catch(err){}
  try { window.opener && window.opener.postMessage({type:'BUILDER_READY'}, '*'); } catch(err){}

  // Context bar close
  const ctxClose = document.querySelector('#ctxBar .ctx-close');
  if (ctxClose) ctxClose.addEventListener('click', () => {
    document.getElementById('ctxBar').style.display='none';
  });

  // Firebase badge
  if (db) {
    document.getElementById('badgeConn').textContent = '● Firebase';
    document.getElementById('badgeConn').style.color = 'var(--green)';
  }
});
</script>
